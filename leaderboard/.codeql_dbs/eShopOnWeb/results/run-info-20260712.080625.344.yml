  relativeBqrsPath: codeql/csharp-queries/Likely Bugs/ThreadUnsafeICryptoTransform.bqrs
  metadata:
    name: Thread-unsafe use of a static ICryptoTransform field
    description: |-
      The class has a field that directly or indirectly make use of a static System.Security.Cryptography.ICryptoTransform object.
                    Using this an instance of this class in concurrent threads is dangerous as it may not only result in an error,
                    but under some circumstances may also result in incorrect results.
    kind: problem
    problem.severity: warning
    security-severity: 7.0
    precision: medium
    id: cs/thread-unsafe-icryptotransform-field-in-class
    tags: |-
      concurrency
             security
             external/cwe/cwe-362
  queryHelp: "# Thread-unsafe use of a static ICryptoTransform field\nClasses that\
    \ implement `System.Security.Cryptography.ICryptoTransform` are not thread safe.\n\
    \nThis problem is caused by the way these classes are implemented using Microsoft\
    \ CAPI/CNG patterns.\n\nFor example, when a hash class implements this interface,\
    \ there would typically be an instance-specific hash object created (for example\
    \ using `BCryptCreateHash` function). This object can be called multiple times\
    \ to add data to the hash (for example `BCryptHashData`). Finally, a function\
    \ is called that finishes the hash and returns the data (for example `BCryptFinishHash`).\n\
    \nAllowing the same hash object to be called with data from multiple threads before\
    \ calling the finish function could potentially lead to incorrect results.\n\n\
    For example, if you have multiple threads hashing `\"abc\"` on a static hash object,\
    \ you may occasionally obtain the results (incorrectly) for hashing `\"abcabc\"\
    `, or face other unexpected behavior.\n\nIt is very unlikely somebody outside\
    \ Microsoft would write a class that implements `ICryptoTransform`, and even if\
    \ they do, it is likely that they will follow the same common pattern as the existing\
    \ classes implementing this interface.\n\nAny object that implements `System.Security.Cryptography.ICryptoTransform`\
    \ should not be used in concurrent threads as the instance members of such object\
    \ are also not thread safe.\n\nPotential problems may not be evident at first,\
    \ but can range from explicit errors such as exceptions, to incorrect results\
    \ when sharing an instance of such an object in multiple threads.\n\n\n## Recommendation\n\
    If the object is shared across instances, you should consider changing the code\
    \ to use a non-static object of type `System.Security.Cryptography.ICryptoTransform`\
    \ instead.\n\nAs an alternative, you could also look into using `ThreadStatic`\
    \ attribute, but make sure you read the initialization remarks on the documentation.\n\
    \n\n## Example\nThis example demonstrates the dangers of using a static `System.Security.Cryptography.ICryptoTransform`\
    \ in a way that generates incorrect results.\n\n\n```csharp\ninternal class TokenCacheThreadUnsafeICryptoTransformDemo\n\
    {\n    private static SHA256 _sha = SHA256.Create();\n\n    public string ComputeHash(string\
    \ data)\n    {\n        byte[] passwordBytes = UTF8Encoding.UTF8.GetBytes(data);\n\
    \        return Convert.ToBase64String(_sha.ComputeHash(passwordBytes));\n   \
    \ }\n}\n\nclass Program\n{\n    static void Main(string[] args)\n    {\n     \
    \   int max = 1000;\n        Task[] tasks = new Task[max];\n\n        Action<object>\
    \ action = (object obj) =>\n        {\n            var unsafeObj = new TokenCacheThreadUnsafeICryptoTransformDemo();\n\
    \            if (unsafeObj.ComputeHash((string)obj) != \"ungWv48Bz+pBQUDeXa4iI7ADYaOWF3qctBD/YfIAFa0=\"\
    )\n            {\n                Console.WriteLine(\"**** We got incorrect Results!!!\
    \ ****\");\n            }\n        };\n\n        for (int i = 0; i < max; i++)\n\
    \        {\n            // hash calculated on all threads should be the same:\n\
    \            // ungWv48Bz+pBQUDeXa4iI7ADYaOWF3qctBD/YfIAFa0= (base64)\n      \
    \      // \n            tasks[i] = Task.Factory.StartNew(action, \"abc\");\n \
    \       }\n\n        Task.WaitAll(tasks);\n    }\n}\n\n```\nA simple fix is to\
    \ change the `_sha` field from being a static member to an instance one by removing\
    \ the `static` keyword.\n\n\n```csharp\ninternal class TokenCacheThreadUnsafeICryptoTransformDemoFixed\n\
    {\n    // We are replacing the static SHA256 field with an instance one\n    //\n\
    \    //private static SHA256 _sha = SHA256.Create();\n    private SHA256 _sha\
    \ = SHA256.Create();\n\n    public string ComputeHash(string data)\n    {\n  \
    \      byte[] passwordBytes = UTF8Encoding.UTF8.GetBytes(data);\n        return\
    \ Convert.ToBase64String(_sha.ComputeHash(passwordBytes));\n    }\n}\n\nclass\
    \ Program\n{\n    static void Main(string[] args)\n    {\n        int max = 1000;\n\
    \        Task[] tasks = new Task[max];\n\n        Action<object> action = (object\
    \ obj) =>\n        {\n            var safeObj = new TokenCacheThreadUnsafeICryptoTransformDemoFixed();\n\
    \            if (safeObj.ComputeHash((string)obj) != \"ungWv48Bz+pBQUDeXa4iI7ADYaOWF3qctBD/YfIAFa0=\"\
    )\n            {\n                Console.WriteLine(\"**** We got incorrect Results!!!\
    \ ****\");\n            }\n        };\n\n        for (int i = 0; i < max; i++)\n\
    \        {\n            // hash calculated on all threads should be the same:\n\
    \            // ungWv48Bz+pBQUDeXa4iI7ADYaOWF3qctBD/YfIAFa0= (base64)\n      \
    \      // \n            tasks[i] = Task.Factory.StartNew(action, \"abc\");\n \
    \       }\n\n        Task.WaitAll(tasks);\n    }\n}\n\n```\n\n## References\n\
    * Microsoft documentation, [ThreadStaticAttribute Class](https://docs.microsoft.com/en-us/dotnet/api/system.threadstaticattribute?view=netframework-4.7.2).\n\
    * Stack Overflow, [Why does SHA1.ComputeHash fail under high load with many threads?](https://stackoverflow.com/questions/26592596/why-does-sha1-computehash-fail-under-high-load-with-many-threads).\n\
    * Common Weakness Enumeration: [CWE-362](https://cwe.mitre.org/data/definitions/362.html).\n"
 -
  pack: codeql/csharp-queries#0
  relativeQueryPath: Likely Bugs/ThreadUnsafeICryptoTransformLambda.ql
  relativeBqrsPath: codeql/csharp-queries/Likely Bugs/ThreadUnsafeICryptoTransformLambda.bqrs
  metadata:
    name: Thread-unsafe capturing of an ICryptoTransform object
    description: |-
      An instance of a class that either implements or has a field of type System.Security.Cryptography.ICryptoTransform is being captured by a lambda,
                    and used in what seems to be a thread initialization method.
                    Using an instance of this class in concurrent threads is dangerous as it may not only result in an error,
                    but under some circumstances may also result in incorrect results.
    kind: problem
    problem.severity: warning
    security-severity: 7.0
    precision: medium
    id: cs/thread-unsafe-icryptotransform-captured-in-lambda
    tags: |-
      concurrency
             security
             external/cwe/cwe-362
  queryHelp: |
    # Thread-unsafe capturing of an ICryptoTransform object
    Classes that implement `System.Security.Cryptography.ICryptoTransform` are not thread safe.

    This problem is caused by the way these classes are implemented using Microsoft CAPI/CNG patterns.

    For example, when a hash class implements this interface, there would typically be an instance-specific hash object created (for example using `BCryptCreateHash` function). This object can be called multiple times to add data to the hash (for example `BCryptHashData`). Finally, a function is called that finishes the hash and returns the data (for example `BCryptFinishHash`).

    Allowing the same hash object to be called with data from multiple threads before calling the finish function could potentially lead to incorrect results.

    For example, if you have multiple threads hashing `"abc"` on a static hash object, you may occasionally obtain the results (incorrectly) for hashing `"abcabc"`, or face other unexpected behavior.

    It is very unlikely somebody outside Microsoft would write a class that implements `ICryptoTransform`, and even if they do, it is likely that they will follow the same common pattern as the existing classes implementing this interface.

    Any object that implements `System.Security.Cryptography.ICryptoTransform` should not be used in concurrent threads as the instance members of such object are also not thread safe.

    Potential problems may not be evident at first, but can range from explicit errors such as exceptions, to incorrect results when sharing an instance of such an object in multiple threads.


    ## Recommendation
    Create new instances of the object that implements or has a field of type `System.Security.Cryptography.ICryptoTransform` to avoid sharing it across multiple threads.


    ## Example
    This example demonstrates the dangers of using a shared `System.Security.Cryptography.ICryptoTransform` in a way that generates incorrect results or may raise an exception.


    ```csharp
    public static void RunThreadUnSafeICryptoTransformLambdaBad()
    {
        const int threadCount = 4;
        // This local variable for a hash object is going to be shared across multiple threads
        var sha1 = SHA1.Create();
        var b = new Barrier(threadCount);
        Action start = () => {
            b.SignalAndWait();
            for (int i = 0; i < 1000; i++)
            {
                var pwd = Guid.NewGuid().ToString();
                var bytes = Encoding.UTF8.GetBytes(pwd);
                // This call may fail, or return incorrect results
                sha1.ComputeHash(bytes);
            }
        };
        var threads = Enumerable.Range(0, threadCount)
                                .Select(_ => new ThreadStart(start))
                                .Select(x => new Thread(x))
                                .ToList();
        foreach (var t in threads) t.Start();
        foreach (var t in threads) t.Join();
    }

    ```
    A simple fix is to change the local variable `sha1` being captured by the lambda to be a local variable within the lambda.


    ```csharp
    public static void RunThreadUnSafeICryptoTransformLambdaFixed()
    {
        const int threadCount = 4;
        var b = new Barrier(threadCount);
        Action start = () => {
            b.SignalAndWait();
            // The hash object is no longer shared
            for (int i = 0; i < 1000; i++)
            {
                var sha1 = SHA1.Create();
                var pwd = Guid.NewGuid().ToString();
                var bytes = Encoding.UTF8.GetBytes(pwd);
                sha1.ComputeHash(bytes);
            }
        };
        var threads = Enumerable.Range(0, threadCount)
                                .Select(_ => new ThreadStart(start))
                                .Select(x => new Thread(x))
                                .ToList();
        foreach (var t in threads) t.Start();
        foreach (var t in threads) t.Join();
    }

    ```

    ## References
    * Microsoft documentation, [ThreadStaticAttribute Class](https://docs.microsoft.com/en-us/dotnet/api/system.threadstaticattribute?view=netframework-4.7.2).
    * Stack Overflow, [Why does SHA1.ComputeHash fail under high load with many threads?](https://stackoverflow.com/questions/26592596/why-does-sha1-computehash-fail-under-high-load-with-many-threads).
    * Common Weakness Enumeration: [CWE-362](https://cwe.mitre.org/data/definitions/362.html).
