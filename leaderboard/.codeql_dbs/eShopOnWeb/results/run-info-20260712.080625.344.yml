  relativeQueryPath: Security Features/CWE-614/CookieWithoutSecure.ql
  relativeBqrsPath: codeql/csharp-queries/Security Features/CWE-614/CookieWithoutSecure.bqrs
  metadata:
    name: Cookie 'Secure' attribute is not set to true
    description: |-
      Cookies without the `Secure` flag may be sent in cleartext.
                    This makes them vulnerable to be intercepted by an attacker.
    kind: problem
    problem.severity: error
    security-severity: 5.0
    precision: high
    id: cs/web/cookie-secure-not-set
    tags: |-
      security
             external/cwe/cwe-319
             external/cwe/cwe-614
  queryHelp: |
    # Cookie 'Secure' attribute is not set to true
    Cookies without the `Secure` flag set may be transmitted using HTTP instead of HTTPS. This leaves them vulnerable to being read by a third party attacker. If a sensitive cookie such as a session key is intercepted this way, it would allow the attacker to perform actions on a user's behalf.


    ## Recommendation
    When using ASP.NET Core, ensure cookies have the secure flag set by setting `Microsoft.AspNetCore.Http.CookieOptions.Secure` to `true`, or using `CookiePolicyOptions` to set a default security policy.

    When using ASP.NET Web Forms, cookies can be configured as secure by default in the `Web.config` file, setting the `requireSSL` attribute to `true` in the `forms` or `httpCookies` element. Cookies may also be set to be secure programmatically by setting the `System.Web.HttpCookie.Secure` attribute to `true`.


    ## Example
    In the example below, `Microsoft.AspNetCore.Http.CookieOptions.Secure` is set to `true`.


    ```csharp
    class MyController : Controller
    {
        void Login()
        {
            var cookieOptions = new Microsoft.AspNetCore.Http.CookieOptions() { Secure = true };
            Response.Cookies.Append("auth", "secret", cookieOptions);
        }
    }
    ```
    In the following example, `CookiePolicyOptions` are set programmatically to configure defaults.


    ```csharp
    public class Startup
    {
        // This method gets called by the runtime. Use this method to configure the HTTP request pipeline.
        public void Configure(IApplicationBuilder app, IWebHostEnvironment env)
        {
            app.UseCookiePolicy(new CookiePolicyOptions()
            {
                Secure = Microsoft.AspNetCore.Http.CookieSecurePolicy.Always,
                HttpOnly = Microsoft.AspNetCore.CookiePolicy.HttpOnlyPolicy.Always
            });
        }
    }
    ```
    In the example below `System.Web.HttpCookie.Secure` is set to `true` programmatically.


    ```csharp
    class MyController : Controller
    {
        void Login()
        {
            var cookie = new System.Web.HttpCookie("cookieName") { Secure = true };
        }
    }
    ```
    In the example below, the `requireSSL` attribute is set to `true` in the `forms` element of the `Web.config` file.


    ```none
    <?xml version="1.0" encoding="utf-8" ?>
    <configuration>
      <system.web>
        <authentication>
          <forms
            requireSSL="true"
            ... />
        </authentication>
        <httpCookies
            requireSSL="true"
            ... />
      </system.web>
    </configuration>

    ```

    ## References
    * ASP.NET Core docs: [CookieOptions.Secure Property](https://docs.microsoft.com/en-us/dotnet/api/microsoft.aspnetcore.http.cookieoptions.secure).
    * MDN: [Set-Cookie](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Set-Cookie) Header.
    * Web Forms docs: [FormsAuthentication.RequireSSL Property](https://msdn.microsoft.com/en-us/library/system.web.security.formsauthentication.requiressl(v=vs.110).aspx).
    * Web Forms docs: [forms Element for authentication](https://msdn.microsoft.com/en-us/library/1d3t3c61(v=vs.100).aspx).
    * Web Forms docs: [httpCookies Element](https://msdn.microsoft.com/library/ms228262%28v=vs.100%29.aspx).
    * Detectify: [Cookie lack Secure flag](https://support.detectify.com/support/solutions/articles/48001048982-cookie-lack-secure-flag).
    * PortSwigger: [TLS cookie without secure flag set](https://portswigger.net/kb/issues/00500200_tls-cookie-without-secure-flag-set).
    * Common Weakness Enumeration: [CWE-319](https://cwe.mitre.org/data/definitions/319.html).
    * Common Weakness Enumeration: [CWE-614](https://cwe.mitre.org/data/definitions/614.html).
