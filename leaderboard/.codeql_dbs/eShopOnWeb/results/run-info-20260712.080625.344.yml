  relativeBqrsPath: codeql/csharp-queries/Security Features/CWE-639/InsecureDirectObjectReference.bqrs
  metadata:
    name: Insecure Direct Object Reference
    description: |-
      Using user input to control which object is modified without
                    proper authorization checks allows an attacker to modify arbitrary objects.
    kind: problem
    problem.severity: warning
    security-severity: 7.5
    precision: medium
    id: cs/web/insecure-direct-object-reference
    tags: |-
      security
             external/cwe/cwe-639
  queryHelp: "# Insecure Direct Object Reference\nResources like comments or user\
    \ profiles can be accessed and modified through an action method. To target a\
    \ certain resource, the action method accepts an ID parameter pointing to that\
    \ specific resource. If the methods do not check that the current user is authorized\
    \ to access the specified resource, an attacker can access a resource by guessing\
    \ or otherwise determining the linked ID parameter.\n\n\n## Recommendation\nEnsure\
    \ that the current user is authorized to access the resource of the provided ID.\n\
    \n\n## Example\nIn the following example, in the \"BAD\" case, there is no authorization\
    \ check, so any user can edit any comment for which they guess or determine the\
    \ ID parameter. The \"GOOD\" case includes a check that the current user matches\
    \ the author of the comment, preventing unauthorized access.\n\n\n```csharp\n\
    \    // BAD - Any user can access this method.\n    protected void btn1_Click(object\
    \ sender, EventArgs e) {\n        string commentId = Request.QueryString[\"Id\"\
    ];\n        Comment comment = getCommentById(commentId);\n        comment.Body\
    \ = inputCommentBody.Text;\n    }\n\n    // GOOD - The user ID is verified.\n\
    \    protected void btn2_Click(object sender, EventArgs e) {\n        string commentId\
    \ = Request.QueryString[\"Id\"];\n        Comment comment = getCommentById(commentId);\n\
    \        if (comment.AuthorName == User.Identity.Name){\n            comment.Body\
    \ = inputCommentBody.Text;\n        }\n    }\n```\nThe following example shows\
    \ a similar scenario for the ASP.NET Core framework. As above, the \"BAD\" case\
    \ provides an example with no authorization check, and the first \"GOOD\" case\
    \ provides an example with a check that the current user authored the specified\
    \ comment. Additionally, in the second \"GOOD\" case, the \\`Authorize\\` attribute\
    \ is used to restrict the method to administrators, who are expected to be able\
    \ to access arbitrary resources.\n\n\n```csharp\npublic class CommentController\
    \ : Controller {\n    private readonly IAuthorizationService _authorizationService;\n\
    \    private readonly IDocumentRepository _commentRepository;\n\n    public CommentController(IAuthorizationService\
    \ authorizationService,\n                              ICommentRepository commentRepository)\n\
    \    {\n        _authorizationService = authorizationService;\n        _commentRepository\
    \ = commentRepository;\n    }\n\n    // BAD: Any user can access this.\n    public\
    \ async Task<IActionResult> Edit1(int commentId, string text) {\n        Comment\
    \ comment = _commentRepository.Find(commentId);\n        \n        comment.Text\
    \ = text;\n\n        return View();\n    }\n\n    // GOOD: An authorization check\
    \ is made.\n    public async Task<IActionResult> Edit2(int commentId, string text)\
    \ {\n        Comment comment = _commentRepository.Find(commentId);\n        \n\
    \        var authResult = await _authorizationService.AuthorizeAsync(User, Comment,\
    \ \"EditPolicy\");\n\n        if (authResult.Succeeded) {\n            comment.Text\
    \ = text;\n            return View();\n        }\n        else {\n           \
    \ return ForbidResult();\n        }\n    }\n\n    // GOOD: Only users with the\
    \ `admin` role can access this method.\n    [Authorize(Roles=\"admin\")]\n   \
    \ public async Task<IActionResult> Edit3(int commentId, string text) {\n     \
    \   Comment comment = _commentRepository.Find(commentId);\n        \n        comment.Text\
    \ = text;\n\n        return View();\n    }\n}\n```\n\n## References\n* OWASP:\
    \ [Insecure Direct Object Refrences](https://wiki.owasp.org/index.php/Top_10_2013-A4-Insecure_Direct_Object_References).\n\
    * OWASP: [Testing for Insecure Direct Object References](https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/05-Authorization_Testing/04-Testing_for_Insecure_Direct_Object_References).\n\
    * Microsoft Learn: [Resource-based authorization in ASP.NET Core](https://learn.microsoft.com/en-us/aspnet/core/security/authorization/resourcebased?view=aspnetcore-7.0).\n\
    * Common Weakness Enumeration: [CWE-639](https://cwe.mitre.org/data/definitions/639.html).\n"
 -
