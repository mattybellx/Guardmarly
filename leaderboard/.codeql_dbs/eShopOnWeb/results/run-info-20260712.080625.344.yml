  relativeBqrsPath: codeql/csharp-queries/Security Features/CWE-079/XSS.bqrs
  metadata:
    name: Cross-site scripting
    description: |-
      Writing user input directly to a web page
                    allows for a cross-site scripting vulnerability.
    kind: path-problem
    problem.severity: error
    security-severity: 7.8
    precision: high
    id: cs/web/xss
    tags: |-
      security
             external/cwe/cwe-079
             external/cwe/cwe-116
  queryHelp: |
    # Cross-site scripting
    Directly writing user input (for example, an HTTP request parameter) to a webpage, without properly sanitizing the input first, allows for a cross-site scripting vulnerability.


    ## Recommendation
    To guard against cross-site scripting, consider using a library that provides suitable encoding functionality, such as the `System.Net.WebUtility` class, to sanitize the untrusted input before writing it to the page. For other possible solutions, see the references.


    ## Example
    The following example shows the page parameter being written directly to the server error page, leaving the website vulnerable to cross-site scripting.


    ```csharp
    using System;
    using System.Web;

    public class XSSHandler : IHttpHandler
    {
        public void ProcessRequest(HttpContext ctx)
        {
            ctx.Response.Write(
                "The page \"" + ctx.Request.QueryString["page"] + "\" was not found.");
        }
    }

    ```
    Sanitizing the user-controlled data using the `WebUtility.HtmlEncode` method prevents the vulnerability:


    ```csharp
    using System;
    using System.Web;
    using System.Net;

    public class XSSHandler : IHttpHandler
    {
        public void ProcessRequest(HttpContext ctx)
        {
            string page = WebUtility.HtmlEncode(ctx.Request.QueryString["page"]);
            ctx.Response.Write(
                "The page \"" + page + "\" was not found.");
        }
    }

    ```

    ## References
    * OWASP: [XSS (Cross Site Scripting) Prevention Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html).
    * Wikipedia: [Cross-site scripting](http://en.wikipedia.org/wiki/Cross-site_scripting).
    * Common Weakness Enumeration: [CWE-79](https://cwe.mitre.org/data/definitions/79.html).
    * Common Weakness Enumeration: [CWE-116](https://cwe.mitre.org/data/definitions/116.html).
 -
  pack: codeql/csharp-queries#0
  relativeQueryPath: Security Features/CWE-089/SqlInjection.ql
  relativeBqrsPath: codeql/csharp-queries/Security Features/CWE-089/SqlInjection.bqrs
  metadata:
    name: SQL query built from user-controlled sources
    description: |-
      Building a SQL query from user-controlled sources is vulnerable to insertion of
                    malicious SQL code by the user.
    kind: path-problem
    problem.severity: error
    security-severity: 8.8
    precision: high
    id: cs/sql-injection
    tags: |-
      security
             external/cwe/cwe-089
  queryHelp: |
    # SQL query built from user-controlled sources
    If a SQL query is built using string concatenation, and the components of the concatenation include user input, a user is likely to be able to run malicious database queries.


    ## Recommendation
    Usually, it is better to use a prepared statement than to build a complete query with string concatenation. A prepared statement can include a parameter, written as either a question mark (`?`) or with an explicit name (`@parameter`), for each part of the SQL query that is expected to be filled in by a different value each time it is run. When the query is later executed, a value must be supplied for each parameter in the query.

    It is good practice to use prepared statements for supplying parameters to a query, whether or not any of the parameters are directly traceable to user input. Doing so avoids any need to worry about quoting and escaping.


    ## Example
    In the following example, the code runs a simple SQL query in three different ways.

    The first way involves building a query, `query1`, by concatenating a user-supplied text box value with some string literals. The text box value can include special characters, so this code allows for SQL injection attacks.

    The second way uses a stored procedure, `ItemsStoredProcedure`, with a single parameter (`@category`). The parameter is then given a value by calling `Parameters.Add`. This version is immune to injection attacks, because any special characters are not given any special treatment.

    The third way builds a query, `query2`, with a single string literal that includes a parameter (`@category`). The parameter is then given a value by calling `Parameters.Add`. This version is immune to injection attacks, because any special characters are not given any special treatment.


    ```csharp
    using System.Data;
    using System.Data.SqlClient;
    using System.Web.UI.WebControls;

    class SqlInjection
    {
        TextBox categoryTextBox;
        string connectionString;

        public DataSet GetDataSetByCategory()
        {
            // BAD: the category might have SQL special characters in it
            using (var connection = new SqlConnection(connectionString))
            {
                var query1 = "SELECT ITEM,PRICE FROM PRODUCT WHERE ITEM_CATEGORY='"
                  + categoryTextBox.Text + "' ORDER BY PRICE";
                var adapter = new SqlDataAdapter(query1, connection);
                var result = new DataSet();
                adapter.Fill(result);
                return result;
            }

            // GOOD: use parameters with stored procedures
            using (var connection = new SqlConnection(connectionString))
            {
                var adapter = new SqlDataAdapter("ItemsStoredProcedure", connection);
                adapter.SelectCommand.CommandType = CommandType.StoredProcedure;
                var parameter = new SqlParameter("category", categoryTextBox.Text);
                adapter.SelectCommand.Parameters.Add(parameter);
                var result = new DataSet();
                adapter.Fill(result);
                return result;
            }

            // GOOD: use parameters with dynamic SQL
            using (var connection = new SqlConnection(connectionString))
            {
                var query2 = "SELECT ITEM,PRICE FROM PRODUCT WHERE ITEM_CATEGORY="
                  + "@category ORDER BY PRICE";
                var adapter = new SqlDataAdapter(query2, connection);
                var parameter = new SqlParameter("category", categoryTextBox.Text);
                adapter.SelectCommand.Parameters.Add(parameter);
                var result = new DataSet();
                adapter.Fill(result);
                return result;
            }
        }
    }

    ```

    ## References
    * MSDN: [How To: Protect From SQL Injection in ASP.NET](https://msdn.microsoft.com/en-us/library/ff648339.aspx).
    * Common Weakness Enumeration: [CWE-89](https://cwe.mitre.org/data/definitions/89.html).
 -
  pack: codeql/csharp-queries#0
  relativeQueryPath: Security Features/CWE-090/LDAPInjection.ql
  relativeBqrsPath: codeql/csharp-queries/Security Features/CWE-090/LDAPInjection.bqrs
  metadata:
    name: LDAP query built from user-controlled sources
    description: |-
      Building an LDAP query from user-controlled sources is vulnerable to insertion of
                    malicious LDAP code by the user.
    kind: path-problem
    problem.severity: error
    security-severity: 9.8
    precision: high
    id: cs/ldap-injection
    tags: |-
      security
             external/cwe/cwe-090
  queryHelp: |
    # LDAP query built from user-controlled sources
    If an LDAP query is built using string concatenation, and the components of the concatenation include user input, a user is likely to be able to run malicious LDAP queries.


    ## Recommendation
    If user input must be included in an LDAP query, it should be escaped to avoid a malicious user providing special characters that change the meaning of the query. If possible, use an existing library, such as the AntiXSS library. One may also make their own encoder filter ``` `LdapEncode` ``` following RFC 4515 standards.


    ## Example
    In the following examples, the code accepts an "organization name" and a "username" from the user, which it uses to query LDAP to access a "type" property.

    The first example concatenates the unvalidated and unencoded user input directly into both the DN (Distinguished Name) and the search filter used for the LDAP query. A malicious user could provide special characters to change the meaning of these queries, and search for a completely different set of values.

    The second example uses the Microsoft AntiXSS library to encode the user values before they are included in the DN and search filters. This ensures the meaning of the query cannot be changed by a malicious user.


    ```csharp
    using Microsoft.Security.Application.Encoder
    using System;
    using System.DirectoryServices;
    using System.Web;

    public class LDAPInjectionHandler : IHttpHandler
    {
        public void ProcessRequest(HttpContext ctx)
        {
            string userName = ctx.Request.QueryString["username"];
            string organizationName = ctx.Request.QueryString["organization_name"];
            // BAD: User input used in DN (Distinguished Name) without encoding
            string ldapQuery = "LDAP://myserver/OU=People,O=" + organizationName;
            using (DirectoryEntry root = new DirectoryEntry(ldapQuery))
            {
                // BAD: User input used in search filter without encoding
                DirectorySearcher ds = new DirectorySearcher(root, "username=" + userName);

                SearchResult result = ds.FindOne();
                if (result != null)
                {
                    using (DirectoryEntry user = result.getDirectoryEntry())
                    {
                        ctx.Response.Write(user.Properties["type"].Value)
                    }
                }
            }

            // GOOD: Organization name is encoded before being used in DN
            string safeOrganizationName = Encoder.LdapDistinguishedNameEncode(organizationName);
            string safeLDAPQuery = "LDAP://myserver/OU=People,O=" + safeOrganizationName;
            using (DirectoryEntry root = new DirectoryEntry(safeLDAPQuery))
            {
                // GOOD: User input is encoded before being used in search filter
                string safeUserName = Encoder.LdapFilterEncode(userName);
                DirectorySearcher ds = new DirectorySearcher(root, "username=" + safeUserName);

                SearchResult result = ds.FindOne();
                if (result != null)
                {
                    using (DirectoryEntry user = result.getDirectoryEntry())
                    {
                        ctx.Response.Write(user.Properties["type"].Value)
                    }
                }
            }
        }
    }

    ```

    ## References
    * OWASP: [LDAP Injection Prevention Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/LDAP_Injection_Prevention_Cheat_Sheet.html).
    * OWASP: [Preventing LDAP Injection in Java](https://www.owasp.org/index.php/Preventing_LDAP_Injection_in_Java).
    * RFC 4515: [String Search Filter Definition](https://datatracker.ietf.org/doc/html/rfc4515#section-3).
    * Common Weakness Enumeration: [CWE-90](https://cwe.mitre.org/data/definitions/90.html).
 -
  pack: codeql/csharp-queries#0
  relativeQueryPath: Security Features/CWE-091/XMLInjection.ql
  relativeBqrsPath: codeql/csharp-queries/Security Features/CWE-091/XMLInjection.bqrs
  metadata:
    name: XML injection
    description: |-
      Building an XML document from user-controlled sources is vulnerable to insertion of
                    malicious code by the user.
    kind: path-problem
    id: cs/xml-injection
    problem.severity: error
    security-severity: 8.8
    precision: high
    tags: |-
      security
             external/cwe/cwe-091
  queryHelp: |
    # XML injection
    The APIs provided by the .NET libraries for XML manipulation allow the insertion of "raw" text at a specified point in an XML document. If user input is passed to this API, it could allow a malicious user to add extra content that could corrupt or supersede existing content, or enable unintended additional functionality.


    ## Recommendation
    Avoid using the `WriteRaw` method on `System.Xml.XmlWriter` with user input. If possible, use the high-level APIs to write new XML elements to a document, as these automatically escape user content. If that is not possible, then user input should be escaped before being included in a string that will be used with the `WriteRaw` API.


    ## Example
    In this example, user input is provided describing the name of an employee to add to an XML document representing a set of names. The `WriteRaw` API is used to write the new employee record to the XML file.


    ```csharp
    using System;
    using System.Security;
    using System.Web;
    using System.Xml;

    public class XMLInjectionHandler : IHttpHandler {
      public void ProcessRequest(HttpContext ctx) {
        string employeeName = ctx.Request.QueryString["employeeName"];

        using (XmlWriter writer = XmlWriter.Create("employees.xml"))
        {
            writer.WriteStartDocument();

            // BAD: Insert user input directly into XML
            writer.WriteRaw("<employee><name>" + employeeName + "</name></employee>");

            writer.WriteEndElement();
            writer.WriteEndDocument();
        }
      }
    }
    ```
    However, if a malicious user were to provide the content `Bobby Pages</name></employee><employee><name>Hacker1`, they would be able to add an extra entry into the XML file.

    The corrected version demonstrates two ways to avoid this issue. The first is to escape user input before passing it to the `WriteRaw` API, which prevents a malicious user from closing or opening XML tags. The second approach uses the high level XML API to add XML elements, which ensures the content is appropriately escaped.


    ```csharp
    using System;
    using System.Security;
    using System.Web;
    using System.Xml;

    public class XMLInjectionHandler : IHttpHandler {
      public void ProcessRequest(HttpContext ctx) {
        string employeeName = ctx.Request.QueryString["employeeName"];

        using (XmlWriter writer = XmlWriter.Create("employees.xml"))
        {
            writer.WriteStartDocument();

            // GOOD: Escape user input before inserting into string
            writer.WriteRaw("<employee><name>" + SecurityElement.Escape(employeeName) + "</name></employee>");

            // GOOD: Use standard API, which automatically encodes values
            writer.WriteStartElement("Employee");
            writer.WriteElementString("Name", employeeName);
            writer.WriteEndElement();

            writer.WriteEndElement();
            writer.WriteEndDocument();
        }
      }
    ```

    ## References
    * Web Application Security Consortium: [XML Injection](http://projects.webappsec.org/w/page/13247004/XML%20Injection).
    * Microsoft Docs: [WriteRaw](https://docs.microsoft.com/en-us/dotnet/api/system.xml.xmlwriter.writeraw?view=netframework-4.8).
    * Common Weakness Enumeration: [CWE-91](https://cwe.mitre.org/data/definitions/91.html).
