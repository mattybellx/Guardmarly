  metadata:
    name: Uncontrolled data used in path expression
    description: Accessing paths influenced by users can allow an attacker to access
      unexpected resources.
    kind: path-problem
    problem.severity: error
    security-severity: 7.5
    precision: high
    id: cs/path-injection
    tags: |-
      security
             external/cwe/cwe-022
             external/cwe/cwe-023
             external/cwe/cwe-036
             external/cwe/cwe-073
             external/cwe/cwe-099
  queryHelp: "# Uncontrolled data used in path expression\nAccessing paths controlled\
    \ by users can allow an attacker to access unexpected resources. This can result\
    \ in sensitive information being revealed or deleted, or an attacker being able\
    \ to influence behavior by modifying unexpected files.\n\nPaths that are naively\
    \ constructed from data controlled by a user may be absolute paths, or may contain\
    \ unexpected special characters such as \"..\". Such a path could point anywhere\
    \ on the file system.\n\n\n## Recommendation\nValidate user input before using\
    \ it to construct a file path.\n\nCommon validation methods include checking that\
    \ the normalized path is relative and does not contain any \"..\" components,\
    \ or checking that the path is contained within a safe folder. The method you\
    \ should use depends on how the path is used in the application, and whether the\
    \ path should be a single path component.\n\nIf the path should be a single path\
    \ component (such as a file name), you can check for the existence of any path\
    \ separators (\"/\" or \"\\\\\"), or \"..\" sequences in the input, and reject\
    \ the input if any are found.\n\nNote that removing \"../\" sequences is *not*\
    \ sufficient, since the input could still contain a path separator followed by\
    \ \"..\". For example, the input \".../...//\" would still result in the string\
    \ \"../\" if only \"../\" sequences are removed.\n\nFinally, the simplest (but\
    \ most restrictive) option is to use an allow list of safe patterns and make sure\
    \ that the user input matches one of these patterns.\n\n\n## Example\nIn this\
    \ example, a user-provided file name is read from a HTTP request and then used\
    \ to access a file and send it back to the user. However, a malicious user could\
    \ enter a file name anywhere on the file system, such as \"/etc/passwd\" or \"\
    ../../../etc/passwd\".\n\n\n```csharp\nusing System;\nusing System.IO;\nusing\
    \ System.Web;\n\npublic class TaintedPathHandler : IHttpHandler\n{\n    public\
    \ void ProcessRequest(HttpContext ctx)\n    {\n        string filename = ctx.Request.QueryString[\"\
    path\"];\n        // BAD: This could read any file on the filesystem.\n      \
    \  ctx.Response.Write(File.ReadAllText(filename));\n    }\n}\n\n```\nIf the input\
    \ should only be a file name, you can check that it doesn't contain any path separators\
    \ or \"..\" sequences.\n\n\n```csharp\nusing System;\nusing System.IO;\nusing\
    \ System.Web;\n\npublic class TaintedPathHandler : IHttpHandler\n{\n    public\
    \ void ProcessRequest(HttpContext ctx)\n    {\n        string filename = ctx.Request.QueryString[\"\
    path\"];\n        // GOOD: ensure that the filename has no path separators or\
    \ parent directory references\n        if (filename.Contains(\"..\") || filename.Contains(\"\
    /\") || filename.Contains(\"\\\\\"))\n        {\n            ctx.Response.StatusCode\
    \ = 400;\n            ctx.Response.StatusDescription = \"Bad Request\";\n    \
    \        ctx.Response.Write(\"Invalid path\");\n            return;\n        }\n\
    \        ctx.Response.Write(File.ReadAllText(filename));\n    }\n}\n\n```\nIf\
    \ the input should be within a specific directory, you can check that the resolved\
    \ path is still contained within that directory.\n\n\n```csharp\nusing System;\n\
    using System.IO;\nusing System.Web;\n\npublic class TaintedPathHandler : IHttpHandler\n\
    {\n    public void ProcessRequest(HttpContext ctx)\n    {\n        string filename\
    \ = ctx.Request.QueryString[\"path\"];\n        \n        string user = ctx.User.Identity.Name;\n\
    \        string publicFolder = Path.GetFullPath(\"/home/\" + user + \"/public\"\
    );\n        string filePath = Path.GetFullPath(Path.Combine(publicFolder, filename));\n\
    \n        // GOOD: ensure that the path stays within the public folder\n     \
    \   if (!filePath.StartsWith(publicFolder + Path.DirectorySeparatorChar))\n  \
    \      {\n            ctx.Response.StatusCode = 400;\n            ctx.Response.StatusDescription\
    \ = \"Bad Request\";\n            ctx.Response.Write(\"Invalid path\");\n    \
    \        return;\n        }\n        ctx.Response.Write(File.ReadAllText(filename));\n\
    \    }\n}\n\n```\n\n## References\n* OWASP: [Path Traversal](https://owasp.org/www-community/attacks/Path_Traversal).\n\
    * Common Weakness Enumeration: [CWE-22](https://cwe.mitre.org/data/definitions/22.html).\n\
    * Common Weakness Enumeration: [CWE-23](https://cwe.mitre.org/data/definitions/23.html).\n\
    * Common Weakness Enumeration: [CWE-36](https://cwe.mitre.org/data/definitions/36.html).\n\
    * Common Weakness Enumeration: [CWE-73](https://cwe.mitre.org/data/definitions/73.html).\n\
    * Common Weakness Enumeration: [CWE-99](https://cwe.mitre.org/data/definitions/99.html).\n"
 -
