  relativeQueryPath: Input Validation/ValueShadowing.ql
  relativeBqrsPath: codeql/csharp-queries/Input Validation/ValueShadowing.bqrs
  metadata:
    name: Value shadowing
    description: Finds ambiguous accesses to client variables
    kind: problem
    problem.severity: warning
    precision: medium
    id: cs/web/ambiguous-client-variable
    tags: |-
      security
             maintainability
             frameworks/asp.net
             external/cwe/cwe-348
  queryHelp: |
    # Value shadowing
    Relying on `HttpRequest` to provide access to a particular client variable is not safe. The `HttpRequest` class implements an indexer to provide a simplified, combined access to its `QueryString`, `Form`, `Cookies`, or `ServerVariables` collections, in that particular order. When searching for a variable, the first match is returned: `QueryString` parameters hence supersede values from forms, cookies and server variables, and so on. This is a serious attack vector since an attacker could inject a value in the query string that you do not expect, and which supersedes the value of a more trusted collection.


    ## Recommendation
    Explicitly restrict the search to one of the `QueryString`, `Form` or `Cookies` collections.


    ## Example
    In this example an attempt has been made to prevent cross site request forgery attacks by comparing a cookie set by the server with a form variable sent by the user. The problem is that if the user did not send a form variable called `csrf` then the collection will fall back to using the cookie value, making it look like a forged request was initiated by the user.


    ```csharp
    class ValueShadowing
    {
        public bool checkCSRF(HttpRequest request)
        {
            string postCSRF = request["csrf"];
            string cookieCSRF = request.Cookies["csrf"];
            return postCSRF.Equals(cookieCSRF);
        }
    }

    ```
    This can be easily fixed by explicitly specifying that we are looking for a form variable.


    ```csharp
    class ValueShadowingFix
    {
        public bool checkCSRF(HttpRequest request)
        {
            string postCSRF = request.Form["csrf"];
            string cookieCSRF = request.Cookies["csrf"];
            return postCSRF.Equals(cookieCSRF);
        }
    }

    ```

    ## References
    * MSDN: [HttpRequest.Item](http://msdn.microsoft.com/en-us/library/system.web.httprequest.item(v=VS.100).aspx).
    * Common Weakness Enumeration: [CWE-348](https://cwe.mitre.org/data/definitions/348.html).
 -
  pack: codeql/csharp-queries#0
  relativeQueryPath: Input Validation/ValueShadowingServerVariable.ql
  relativeBqrsPath: codeql/csharp-queries/Input Validation/ValueShadowingServerVariable.bqrs
  metadata:
    name: "Value shadowing: server variable"
    description: Finds ambiguous accesses to server variables
    kind: problem
    problem.severity: warning
    precision: medium
    id: cs/web/ambiguous-server-variable
    tags: |-
      security
             maintainability
             frameworks/asp.net
             external/cwe/cwe-348
  queryHelp: |
    # Value shadowing: server variable
    Relying on `HttpRequest` to provide access to a particular server variable is not safe as it can be overridden by the client. The `HttpRequest` class implements an indexer to provide a simplified, combined access to its `QueryString`, `Form` , `Cookies`, or `ServerVariables` collections, in that particular order. When searching for a variable, the first match is returned: `QueryString` parameters hence supersede values from forms, cookies and server variables, and so on. This is a serious attack vector since an attacker could inject a value in the query string that you do not expect, and which supersedes the value of the server variable you were actually trying to check.


    ## Recommendation
    Explicitly restrict the search to the `ServerVariables` collection.


    ## Example
    In this example the server attempts to ensure the user is using an HTTPS connection. Because the programmer used the `HttpRequest` indexer, URLs like ` http://www.example.org/?HTTPS=ON` appear to be from a secure connection even though they are not.


    ```csharp
    class ValueShadowingServerVariable
    {
        public bool isHTTPS(HttpRequest request)
        {
            String https = request["HTTPS"];
            return https == "ON";
        }
    }

    ```
    This can be easily fixed by explicitly specifying that we are looking for a server variable.


    ```csharp
    class ValueShadowingServerVariableFix
    {
        public bool isHTTPS(HttpRequest request)
        {
            String https = request.ServerVariables["HTTPS"];
            return https == "ON";
        }
    }

    ```

    ## References
    * MSDN: [HttpRequest.Item](http://msdn.microsoft.com/en-us/library/system.web.httprequest.item(v=VS.100).aspx).
    * MSDN: [IIS Server Variables](http://msdn.microsoft.com/en-us/library/ms524602.aspx).
    * Common Weakness Enumeration: [CWE-348](https://cwe.mitre.org/data/definitions/348.html).
 -
