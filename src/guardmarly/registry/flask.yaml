language: python
framework: flask
version: "1.0"
description: "Flask security sink rules covering routing, template rendering, SSRF, auth, and file handling"
rules:
  - id: registry/flask/sqli/db-execute-raw
    title: "SQL Injection via db.engine.execute() or db.session.execute()"
    cwe: CWE-89
    severity: critical
    pattern_type: taint_sink
    sinks:
      - db.engine.execute("
      - db.engine.execute('
      - db.engine.execute(f"
      - db.engine.execute(f'
      - db.session.execute("
      - db.session.execute('
      - db.session.execute(f"
      - db.session.execute(f'
      - engine.execute("
      - engine.execute('
      - connection.execute("
      - connection.execute('
    suggestion: "Use SQLAlchemy parameterized text('SQL :param', {'param': val})"

  - id: registry/flask/sqli/cursor-raw
    title: "SQL Injection via direct cursor.execute()"
    cwe: CWE-89
    severity: critical
    pattern_type: taint_sink
    sinks:
      - cursor.execute(
      - conn.execute(
    suggestion: "Always pass parameters as a separate tuple/list to cursor.execute()"

  - id: registry/flask/sqli/string-format-query
    title: "SQL Injection via string formatting in query"
    cwe: CWE-89
    severity: critical
    pattern_type: taint_sink
    sinks:
      - "execute(f\""
      - "execute(f'"
      - "execute(\"SELECT"
      - "execute('SELECT"
    suggestion: "Use parameterized queries; never format SQL with user data"

  - id: registry/flask/ssti/render-template-string
    title: "SSTI via render_template_string with user data"
    cwe: CWE-94
    severity: critical
    pattern_type: taint_sink
    sinks:
      - render_template_string(
    suggestion: "Never pass user-controlled data to render_template_string(); use render_template() with a file"

  - id: registry/flask/ssti/jinja-from-request
    title: "SSTI via Jinja2 Environment.from_string with request data"
    cwe: CWE-94
    severity: critical
    pattern_type: taint_sink
    sinks:
      - Environment().from_string(
      - jinja2.Template(request.
      - env.from_string(request.
    suggestion: "Template strings must be static; user data belongs in template variables only"

  - id: registry/flask/redirect/open-redirect
    title: "Open Redirect via redirect() with user-controlled URL"
    cwe: CWE-601
    severity: high
    pattern_type: taint_sink
    sinks:
      - redirect(request.args.get(
      - redirect(request.form.get(
      - redirect(request.values.get(
      - redirect(request.json.get(
    suggestion: "Validate redirect targets against a safe allowlist"

  - id: registry/flask/xss/make-response-unsafe
    title: "XSS via make_response with user-controlled HTML"
    cwe: CWE-79
    severity: critical
    pattern_type: taint_sink
    sinks:
      - make_response(request.args
      - make_response(request.form
      - make_response(request.values
      - Response(request.args
    suggestion: "Escape user data with markupsafe.escape() before embedding in HTML responses"

  - id: registry/flask/xss/markupsafe-markup
    title: "XSS via Markup() wrapping user-controlled string"
    cwe: CWE-79
    severity: critical
    pattern_type: taint_sink
    sinks:
      - Markup(request.args
      - Markup(request.form
      - Markup(request.values
      - Markup(request.data
    suggestion: "Never wrap user data in Markup(); the string will be rendered unescaped"

  - id: registry/flask/cmd/os-system-request
    title: "Command Injection via os.system with request data"
    cwe: CWE-78
    severity: critical
    pattern_type: taint_sink
    sinks:
      - os.system(request.args
      - os.system(request.form
      - os.popen(request.args
      - subprocess.run(request.args
      - subprocess.call(request.args
      - subprocess.check_output(request.args
    suggestion: "Use subprocess with a list of args and shell=False"

  - id: registry/flask/file/send-file-traversal
    title: "Path Traversal via send_file with user-controlled path"
    cwe: CWE-22
    severity: critical
    pattern_type: taint_sink
    sinks:
      - send_file(request.args
      - send_file(request.form
      - send_file(request.values
      - send_from_directory(request.
    suggestion: "Use send_from_directory with a fixed directory and validated filename"

  - id: registry/flask/file/unsafe-filename
    title: "Unsafe file save path from upload filename"
    cwe: CWE-22
    severity: high
    pattern_type: taint_sink
    sinks:
      - os.path.join(app.config['UPLOAD_FOLDER'], filename)
      - os.path.join(UPLOAD_FOLDER, filename)
    suggestion: "Use werkzeug.utils.secure_filename(); validate against allowed extensions"

  - id: registry/flask/ssrf/requests-get-user-url
    title: "SSRF via requests.get with user-controlled URL"
    cwe: CWE-918
    severity: high
    pattern_type: taint_sink
    sinks:
      - requests.get(request.args
      - requests.post(request.args
      - requests.get(request.form
      - requests.post(request.form
      - httpx.get(request.args
    suggestion: "Validate URLs against an allowlist; block 169.254.0.0/16 and 10.0.0.0/8"

  - id: registry/flask/deserialization/pickle-request
    title: "Unsafe Deserialization via pickle with request data"
    cwe: CWE-502
    severity: critical
    pattern_type: taint_sink
    sinks:
      - pickle.loads(request.data
      - pickle.loads(request.get_data
      - pickle.load(request.
    suggestion: "Use JSON or msgpack instead of pickle"

  - id: registry/flask/deserialization/yaml-unsafe-load
    title: "Unsafe YAML deserialization via yaml.load()"
    cwe: CWE-502
    severity: critical
    pattern_type: taint_sink
    sinks:
      - yaml.load(request.data
      - yaml.load(request.get_data
      - yaml.load(request.form
    suggestion: "Use yaml.safe_load() to prevent arbitrary Python object instantiation"

  - id: registry/flask/auth/secret-key-hardcoded
    title: "Flask SECRET_KEY hardcoded"
    cwe: CWE-798
    severity: critical
    pattern_type: regex
    regex: "app\\.secret_key\\s*=\\s*['\"][a-zA-Z0-9]{1,32}['\"]"
    suggestion: "Load SECRET_KEY from os.environ.get('SECRET_KEY'); use at least 32 random bytes"

  - id: registry/flask/auth/debug-mode
    title: "Flask app running with debug=True"
    cwe: CWE-215
    severity: high
    pattern_type: regex
    regex: "app\\.run\\(.*debug\\s*=\\s*True"
    suggestion: "Set debug=False in production; use an environment variable"

  - id: registry/flask/auth/session-no-httponly
    title: "Flask session cookie without HTTPOnly flag"
    cwe: CWE-1004
    severity: medium
    pattern_type: regex
    regex: "SESSION_COOKIE_HTTPONLY\\s*=\\s*False"
    suggestion: "Set SESSION_COOKIE_HTTPONLY = True"

  - id: registry/flask/auth/session-no-secure
    title: "Flask session cookie transmitted over HTTP"
    cwe: CWE-614
    severity: high
    pattern_type: regex
    regex: "SESSION_COOKIE_SECURE\\s*=\\s*False"
    suggestion: "Set SESSION_COOKIE_SECURE = True for HTTPS-only cookies"

  - id: registry/flask/auth/permanent-session-no-timeout
    title: "Permanent session without lifetime limit"
    cwe: CWE-613
    severity: medium
    pattern_type: regex
    regex: "session\\.permanent\\s*=\\s*True"
    suggestion: "Set app.permanent_session_lifetime = timedelta(hours=N)"

  - id: registry/flask/eval/code-exec
    title: "Code Injection via eval/exec with request data"
    cwe: CWE-95
    severity: critical
    pattern_type: taint_sink
    sinks:
      - eval(request.args
      - eval(request.form
      - eval(request.data
      - exec(request.args
      - exec(request.form
      - exec(request.data
    suggestion: "Never eval or exec user-supplied strings"

  - id: registry/flask/xxe/defusedxml-missing
    title: "XXE via xml.etree.ElementTree.fromstring with request data"
    cwe: CWE-611
    severity: high
    pattern_type: taint_sink
    sinks:
      - ET.fromstring(request.data
      - ElementTree.parse(request.
      - minidom.parseString(request.data
    suggestion: "Use defusedxml.ElementTree instead of stdlib xml.etree"

  - id: registry/flask/cors/allow-all
    title: "CORS: all origins allowed via flask-cors"
    cwe: CWE-942
    severity: high
    pattern_type: regex
    regex: "CORS\\(app,\\s*origins\\s*=\\s*['\"]\\*['\"]|CORS\\(app\\)"
    suggestion: "Specify explicit origins in CORS(app, origins=['https://yourdomain.com'])"

  - id: registry/flask/header/content-type-sniff
    title: "Missing X-Content-Type-Options header"
    cwe: CWE-16
    severity: medium
    pattern_type: regex
    regex: "X-Content-Type-Options.*nosniff"
    suggestion: "Add after_request hook: response.headers['X-Content-Type-Options'] = 'nosniff'"

  - id: registry/flask/upload/unrestricted-content-type
    title: "File upload with no MIME type or extension restriction"
    cwe: CWE-434
    severity: high
    pattern_type: taint_sink
    sinks:
      - request.files.get(
      - request.files['
      - request.files["
    suggestion: "Check file.content_type and filename extension against an allowlist before saving"

  - id: registry/flask/crypto/md5-hash
    title: "MD5 used for security-sensitive hashing"
    cwe: CWE-328
    severity: high
    pattern_type: taint_sink
    sinks:
      - hashlib.md5(
      - hashlib.sha1(
    suggestion: "Use hashlib.sha256() or bcrypt/Argon2 for passwords"

  - id: registry/flask/logging/sensitive-in-log
    title: "Password or token written to Flask logger"
    cwe: CWE-532
    severity: medium
    pattern_type: taint_sink
    sinks:
      - app.logger.info(password
      - app.logger.debug(password
      - app.logger.error(token
      - app.logger.debug(token
    suggestion: "Redact or mask sensitive values before logging"

  - id: registry/flask/json/jsonify-request-direct
    title: "Reflected request data in JSON response"
    cwe: CWE-79
    severity: medium
    pattern_type: taint_sink
    sinks:
      - jsonify(request.args
      - jsonify(request.form
      - jsonify(request.json
    suggestion: "Validate and sanitize request data with a schema before returning it"

  - id: registry/flask/auth/before-request-bypass
    title: "before_request handler may be bypassed for OPTIONS"
    cwe: CWE-284
    severity: medium
    pattern_type: regex
    regex: "@app\\.before_request"
    suggestion: "Ensure before_request auth checks handle OPTIONS/preflight and all HTTP methods"

  - id: registry/flask/idor/db-query-no-owner
    title: "IDOR via database query without user-scoping"
    cwe: CWE-639
    severity: high
    pattern_type: taint_sink
    sinks:
      - Model.query.get(
      - Model.query.filter_by(id=
      - db.session.get(
    suggestion: "Filter by owner: Model.query.filter_by(id=id, user_id=current_user.id)"

  - id: registry/flask/regex/redos
    title: "ReDoS via user-controlled regex"
    cwe: CWE-400
    severity: high
    pattern_type: taint_sink
    sinks:
      - re.compile(request.args
      - re.compile(request.form
      - re.match(request.args
      - re.search(request.args
    suggestion: "Never compile user-supplied strings as regex patterns"

  - id: registry/flask/response/header-injection
    title: "HTTP response splitting via user-controlled header"
    cwe: CWE-113
    severity: high
    pattern_type: taint_sink
    sinks:
      - response.headers['
      - response.headers["
    suggestion: "Strip CR/LF from header values before setting them"

  - id: registry/flask/config/from-env-unsafe
    title: "Unsafe FLASK_ENV or FLASK_DEBUG in production"
    cwe: CWE-215
    severity: medium
    pattern_type: regex
    regex: "FLASK_ENV\\s*=\\s*['\"]development['\"]|FLASK_DEBUG\\s*=\\s*['\"]?1['\"]?"
    suggestion: "Ensure FLASK_ENV=production and FLASK_DEBUG=0 in production"

  - id: registry/flask/crypto/weak-random
    title: "Insecure random for CSRF token or session"
    cwe: CWE-330
    severity: high
    pattern_type: taint_sink
    sinks:
      - random.choice(
      - random.randint(
      - random.random(
    suggestion: "Use secrets.token_hex() or secrets.token_urlsafe() for tokens"

  - id: registry/flask/blueprint/wildcard-url
    title: "Blueprint wildcard route may expose internal paths"
    cwe: CWE-284
    severity: medium
    pattern_type: regex
    regex: "@.*route\\(['\"]/<path:.*>['\"]"
    suggestion: "Restrict wildcard routes and validate path parameters against expected formats"

  - id: registry/flask/auth/no-login-required
    title: "Route handler missing @login_required decorator"
    cwe: CWE-306
    severity: high
    pattern_type: ast_structural
    route_decorator: "@app.route("
    missing_decorators:
      - "@login_required"
    suggestion: "Add @login_required or equivalent auth check to protect this route"

  - id: registry/flask/cmd/popen-shell
    title: "Command Injection via subprocess with shell=True"
    cwe: CWE-78
    severity: critical
    pattern_type: taint_sink
    sinks:
      - subprocess.Popen(request.
      - subprocess.Popen(f"
      - Popen(request.args
    suggestion: "Use subprocess.run with shell=False and a list of arguments"

  - id: registry/flask/path/os-walk-user
    title: "Path Traversal via os.walk with user-controlled path"
    cwe: CWE-22
    severity: high
    pattern_type: taint_sink
    sinks:
      - os.walk(request.args
      - os.walk(request.form
      - os.listdir(request.args
      - os.listdir(request.form
    suggestion: "Restrict directory traversal to a safe base directory"

  - id: registry/flask/idor/file-id-no-auth
    title: "Direct Object Reference via file ID without auth check"
    cwe: CWE-639
    severity: high
    pattern_type: taint_sink
    sinks:
      - os.path.join(BASE_DIR, request.args.get(
      - os.path.join(MEDIA_ROOT, request.args.get(
    suggestion: "Verify ownership before serving files identified by user-supplied IDs"

  - id: registry/flask/misconfiguration/force-https-missing
    title: "HTTP strict transport security not enforced"
    cwe: CWE-319
    severity: low
    confidence: 0.40
    pattern_type: regex
    regex: "PREFERRED_URL_SCHEME\\s*=\\s*['\"]http['\"]"
    suggestion: "Set PREFERRED_URL_SCHEME='https' and use flask-talisman or HSTS header"

  - id: registry/flask/auth/weak-token-signing
    title: "JWT or itsdangerous signed with weak key"
    cwe: CWE-347
    severity: high
    pattern_type: taint_sink
    sinks:
      - URLSafeTimedSerializer('
      - URLSafeTimedSerializer("
      - Signer('password
      - Signer("password
    suggestion: "Use a cryptographically random secret of at least 32 bytes for signers"

  - id: registry/flask/session/server-side-eval
    title: "Server-side template evaluated from session data"
    cwe: CWE-94
    severity: critical
    pattern_type: taint_sink
    sinks:
      - render_template_string(session[
      - Template(session[
    suggestion: "Never render template strings from session data; use static template files"

  - id: registry/flask/headers/missing-csp
    title: "Flask response missing Content-Security-Policy header"
    cwe: CWE-693
    severity: medium
    pattern_type: regex
    regex: "@app\\.route.*\\ndef \\w+.*:\\s*(?!.*Content-Security-Policy)"
    suggestion: "Set CSP headers via Flask-Talisman or add: response.headers['Content-Security-Policy'] = \"default-src 'self'\""

  - id: registry/flask/headers/missing-hsts
    title: "Flask application without HTTPS Strict Transport Security"
    cwe: CWE-319
    severity: medium
    pattern_type: regex
    regex: "Flask\\(__name__\\)(?!.*Talisman|.*HTTPS|.*HSTS)"
    suggestion: "Enable HSTS via Flask-Talisman: Talisman(app, force_https=True, strict_transport_security=True)"

  - id: registry/flask/logging/sensitive-in-log
    title: "Password or token logged via Flask/Python logging"
    cwe: CWE-532
    severity: high
    pattern_type: taint_sink
    sinks:
      - "app.logger.info(.*password"
      - "logging.info(.*token"
      - "print(request.form['password'"
      - "print(request.json['token'"
    suggestion: "Never log credentials or tokens; use structured logging with field redaction for sensitive fields"

  - id: registry/flask/auth/login-bypass-empty-password
    title: "Authentication bypass — empty password check using falsy comparison"
    cwe: CWE-287
    severity: critical
    pattern_type: taint_sink
    sinks:
      - "if not user.password"
      - "if password is None"
      - "if not password:"
    suggestion: "Explicitly check password length > 0 and use constant-time comparison; empty passwords should fail"

  - id: registry/flask/injection/eval-user-expression
    title: "Arbitrary code execution via eval() of user-supplied expression"
    cwe: CWE-95
    severity: critical
    pattern_type: taint_sink
    sinks:
      - "eval(request.args"
      - "eval(request.form"
      - "eval(request.json"
      - "eval(request.data"
    suggestion: "Never eval() user input; use a safe expression parser or predefined mapping instead"

  - id: registry/flask/upload/unrestricted-file-type
    title: "Unrestricted file upload without extension or MIME validation"
    cwe: CWE-434
    severity: high
    pattern_type: taint_sink
    sinks:
      - "request.files['file'].save("
      - "request.files.get('file').save("
      - ".save(os.path.join("
    suggestion: "Validate file extension against an allowlist and check MIME type before saving; store outside web root"

  - id: registry/flask/upload/path-traversal-filename
    title: "Path traversal via user-controlled upload filename"
    cwe: CWE-22
    severity: critical
    pattern_type: taint_sink
    sinks:
      - "filename = request.files['file'].filename"
      - "filename = file.filename"
      - "os.path.join(UPLOAD_FOLDER, filename)"
    suggestion: "Always use werkzeug.utils.secure_filename() and validate the path stays within UPLOAD_FOLDER"
