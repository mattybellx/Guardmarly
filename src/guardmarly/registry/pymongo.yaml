language: python
framework: pymongo
version: "1.0"
description: "MongoDB/PyMongo security rules: NoSQL injection, auth, and data exposure"
rules:
  - id: registry/pymongo/nosqli/find-user-filter
    title: "NoSQL Injection via find() with user-controlled filter"
    cwe: CWE-943
    severity: critical
    pattern_type: taint_sink
    sinks:
      - collection.find(request.
      - collection.find(user_
      - collection.find({user_
      - db.collection.find(request.
    suggestion: "Validate and sanitize filter keys/values; use schema validation before querying"

  - id: registry/pymongo/nosqli/find-one-user
    title: "NoSQL Injection via find_one() with user filter"
    cwe: CWE-943
    severity: critical
    pattern_type: taint_sink
    sinks:
      - collection.find_one(request.
      - collection.find_one(user_
      - collection.find_one({user_
    suggestion: "Use explicit typed filter dicts; never pass raw request dicts to queries"

  - id: registry/pymongo/nosqli/where-clause
    title: "NoSQL Injection via $where operator"
    cwe: CWE-943
    severity: critical
    pattern_type: taint_sink
    sinks:
      - '$where':
      - "$where":
    suggestion: "Avoid $where with user data; use $expr with aggregation operators"

  - id: registry/pymongo/nosqli/regex-injection
    title: "NoSQL Injection via $regex with user input"
    cwe: CWE-943
    severity: high
    pattern_type: taint_sink
    sinks:
      - '$regex': user_
      - '$regex': request.
      - "$regex": user_
    suggestion: "Escape regex special chars or use exact equality matches"

  - id: registry/pymongo/nosqli/update-set-user
    title: "NoSQL Injection via update with user-controlled $set"
    cwe: CWE-943
    severity: critical
    pattern_type: taint_sink
    sinks:
      - collection.update_one(
      - collection.update_many(
      - collection.replace_one(
    suggestion: "Validate update document structure; restrict allowed update keys"

  - id: registry/pymongo/nosqli/aggregate-user
    title: "NoSQL Injection via aggregate pipeline with user data"
    cwe: CWE-943
    severity: high
    pattern_type: taint_sink
    sinks:
      - collection.aggregate([{user_
      - collection.aggregate(pipeline=
    suggestion: "Validate pipeline stages; never inject user strings into $match or $group"

  - id: registry/pymongo/auth/no-auth-source
    title: "MongoDB connection without authentication"
    cwe: CWE-306
    severity: high
    confidence: 0.60
    pattern_type: regex
    regex: "MongoClient\\(['\"]mongodb://(?!.*:[^@]+@)"
    suggestion: "Always include credentials in the connection string or use authSource"

  - id: registry/pymongo/auth/hardcoded-uri
    title: "Hardcoded MongoDB URI with credentials"
    cwe: CWE-798
    severity: critical
    pattern_type: regex
    regex: "MongoClient\\(['\"]mongodb://[^:]+:[^@]+@"
    suggestion: "Load MongoDB URI from environment variables"

  - id: registry/pymongo/auth/no-tls
    title: "MongoDB connection without TLS"
    cwe: CWE-319
    severity: medium
    confidence: 0.55
    pattern_type: regex
    regex: "MongoClient\\(.*tls\\s*=\\s*False|ssl\\s*=\\s*False"
    suggestion: "Enable TLS: MongoClient(tls=True, tlsCAFile='ca.pem')"

  - id: registry/pymongo/exposure/return-all-docs
    title: "Returning all collection documents to client"
    cwe: CWE-200
    severity: high
    pattern_type: taint_sink
    sinks:
      - list(collection.find())
      - list(db.collection.find())
    suggestion: "Paginate results and project only required fields"

  - id: registry/pymongo/nosqli/grid-fs-user
    title: "NoSQL Injection via GridFS with user filename"
    cwe: CWE-22
    severity: high
    pattern_type: taint_sink
    sinks:
      - fs.find({'filename': user_
      - gridfs.find({'filename': request.
    suggestion: "Validate and sanitize filenames before GridFS queries"

  - id: registry/pymongo/cmd/mapreduce-user
    title: "Code Injection via MapReduce with user code"
    cwe: CWE-94
    severity: critical
    pattern_type: taint_sink
    sinks:
      - collection.map_reduce(user_
      - collection.inline_map_reduce(user_
    suggestion: "Never pass user-controlled strings as map/reduce functions"

  - id: registry/pymongo/nosqli/bulk-write-user
    title: "NoSQL Injection via bulk_write with user operations"
    cwe: CWE-943
    severity: high
    pattern_type: taint_sink
    sinks:
      - collection.bulk_write(user_
      - collection.bulk_write(operations=request.
    suggestion: "Validate each operation type and document structure before bulk writes"

  - id: registry/pymongo/nosqli/delete-user-filter
    title: "Privilege escalation via delete_many with user filter"
    cwe: CWE-943
    severity: critical
    pattern_type: taint_sink
    sinks:
      - collection.delete_many(request.
      - collection.delete_many(user_
      - collection.delete_many({user_
    suggestion: "Restrict delete filters; add ownership checks before bulk deletes"

  - id: registry/pymongo/auth/motor-no-auth
    title: "Motor (async MongoDB) connection without authentication"
    cwe: CWE-306
    severity: critical
    pattern_type: regex
    regex: "motor\\.motor_asyncio\\.AsyncIOMotorClient\\(['\"]mongodb://(?!.*:[^@]+@)"
    suggestion: "Include credentials in the Motor connection string"

  - id: registry/pymongo/exposure/password-in-doc
    title: "Password stored in MongoDB document without hashing"
    cwe: CWE-256
    severity: critical
    pattern_type: taint_sink
    sinks:
      - collection.insert_one({'password': password
      - collection.insert_one({"password": password
    suggestion: "Hash passwords with bcrypt or Argon2 before storing in MongoDB"

  - id: registry/pymongo/nosqli/eval-command
    title: "Code Injection via MongoDB eval command"
    cwe: CWE-94
    severity: critical
    pattern_type: taint_sink
    sinks:
      - db.command('eval',
      - db.eval(
    suggestion: "The eval command is removed in MongoDB 4.2+; never pass user code"

  - id: registry/pymongo/nosqli/where-js
    title: "JavaScript execution via $where with user data"
    cwe: CWE-94
    severity: critical
    pattern_type: regex
    regex: "\\$where.*function\\s*\\("
    suggestion: "Avoid $where entirely; use aggregation expressions instead"

  - id: registry/pymongo/nosqli/find-one-and-update-user
    title: "NoSQL Injection via find_one_and_update with user filter/update"
    cwe: CWE-943
    severity: critical
    pattern_type: taint_sink
    sinks:
      - collection.find_one_and_update(request.
      - collection.find_one_and_update(user_
      - db.users.find_one_and_update(request.
    suggestion: "Validate both filter and update documents before calling find_one_and_update"

  - id: registry/pymongo/deserialization/bson-decode-user
    title: "Unsafe BSON decode from user-controlled payload"
    cwe: CWE-502
    severity: high
    pattern_type: taint_sink
    sinks:
      - bson.BSON(request.
      - bson.BSON(user_
      - BSON(request.
    suggestion: "Validate and constrain BSON structures from untrusted sources"

  - id: registry/pymongo/auth/tls-insecure-options
    title: "MongoDB TLS configured with insecure certificate validation"
    cwe: CWE-295
    severity: high
    pattern_type: regex
    regex: "tlsAllowInvalidCertificates\\s*=\\s*True|tlsInsecure\\s*=\\s*True"
    suggestion: "Require certificate validation in TLS connections"

  - id: registry/pymongo/exposure/find-one-user-return
    title: "User-influenced find_one result returned directly"
    cwe: CWE-200
    severity: medium
    pattern_type: taint_sink
    sinks:
      - return collection.find_one(request.
      - return db.users.find_one(request.
      - return user_collection.find_one(request.
    suggestion: "Project only safe fields and avoid direct document passthrough"

  - id: registry/pymongo/nosqli/sort-user-field
    title: "User-controlled MongoDB sort field"
    cwe: CWE-20
    severity: medium
    pattern_type: taint_sink
    sinks:
      - .sort(request.
      - .sort([(request.
      - .sort([(user_
    suggestion: "Allowlist sortable fields and fixed sort directions"
