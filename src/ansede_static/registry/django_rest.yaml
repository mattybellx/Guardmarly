language: python
framework: django_rest
version: "1.0"
description: "Django REST Framework security rules: serializer bypass, auth, IDOR, and endpoint exposure"
rules:
  - id: registry/drf/auth/missing-permission-class
    title: "DRF ViewSet missing permission_classes"
    cwe: CWE-284
    severity: high
    pattern_type: ast_structural
    route_decorator: "class.*ViewSet"
    missing_decorators:
      - "permission_classes"
    suggestion: "Add permission_classes = [IsAuthenticated] or a custom permission to all ViewSets"

  - id: registry/drf/auth/allow-any-production
    title: "AllowAny permission in production API"
    cwe: CWE-284
    severity: high
    pattern_type: taint_sink
    sinks:
      - permission_classes = [AllowAny]
      - permission_classes = (AllowAny,)
    suggestion: "Use IsAuthenticated or a custom permission; only use AllowAny for truly public endpoints"

  - id: registry/drf/serializer/mass-assignment
    title: "Mass Assignment via serializer.save(**request.data)"
    cwe: CWE-915
    severity: high
    pattern_type: taint_sink
    sinks:
      - serializer.save(**request.data
      - serializer.save(**validated_data
    suggestion: "Use explicit field assignment in serializer.save(user=request.user)"

  - id: registry/drf/serializer/no-validation
    title: "Serializer field without input validation"
    cwe: CWE-20
    severity: medium
    pattern_type: taint_sink
    sinks:
      - CharField(required=False, allow_blank=True)
      - IntegerField(required=False)
    suggestion: "Add validators, min_length, max_length, and required constraints to all fields"

  - id: registry/drf/auth/basic-auth-clear-text
    title: "BasicAuthentication sends credentials in clear text"
    cwe: CWE-319
    severity: medium
    confidence: 0.55
    pattern_type: taint_sink
    sinks:
      - authentication_classes = [BasicAuthentication]
      - authentication_classes = (BasicAuthentication,)
    suggestion: "Use TokenAuthentication or JWT; only use BasicAuthentication over HTTPS"

  - id: registry/drf/auth/session-auth-csrf-risk
    title: "SessionAuthentication without CSRF enforcement"
    cwe: CWE-352
    severity: high
    pattern_type: taint_sink
    sinks:
      - authentication_classes = [SessionAuthentication]
    suggestion: "Ensure CSRF middleware is enabled with SessionAuthentication"

  - id: registry/drf/token/exposed-in-response
    title: "Authentication token returned in response body"
    cwe: CWE-312
    severity: medium
    pattern_type: taint_sink
    sinks:
      - Response({'token': token})
      - Response({"token": token})
    suggestion: "Use HttpOnly cookie for tokens instead of response body"

  - id: registry/drf/idor/get-queryset-no-owner
    title: "IDOR via get_queryset without user scoping"
    cwe: CWE-639
    severity: medium
    pattern_type: taint_sink
    sinks:
      - return queryset
      - return self.model.objects.all()
    suggestion: "Scope queryset to the current user: queryset.filter(user=self.request.user)"
    confidence: 0.35

  - id: registry/drf/pagination/no-max-limit
    title: "Pagination without max page size limit"
    cwe: CWE-400
    severity: medium
    pattern_type: regex
    regex: "PAGE_SIZE\\s*=\\s*(?:None|0)"
    suggestion: "Set MAX_PAGE_SIZE in DRF settings to prevent large data dumps"

  - id: registry/drf/renderer/browsable-api-prod
    title: "BrowsableAPIRenderer enabled in production"
    cwe: CWE-200
    severity: medium
    pattern_type: taint_sink
    sinks:
      - renderer_classes = [BrowsableAPIRenderer
      - 'DEFAULT_RENDERER_CLASSES': ['rest_framework.renderers.BrowsableAPIRenderer
    suggestion: "Disable BrowsableAPIRenderer in production by removing it from DEFAULT_RENDERER_CLASSES"

  - id: registry/drf/filter/unvalidated-search
    title: "SearchFilter on sensitive field without restriction"
    cwe: CWE-200
    severity: medium
    pattern_type: taint_sink
    sinks:
      - search_fields = ['password
      - search_fields = ['email
      - search_fields = ['token
    suggestion: "Exclude sensitive fields from search_fields"

  - id: registry/drf/viewset/unsafe-http-method
    title: "DELETE endpoint without explicit permission check"
    cwe: CWE-284
    severity: medium
    pattern_type: ast_structural
    route_decorator: "def destroy"
    missing_decorators:
      - "permission_classes"
      - "IsAdminUser"
    suggestion: "Add IsAdminUser or custom permission to destroy actions"
    confidence: 0.4

  - id: registry/drf/throttle/missing-rate-limit
    title: "API view missing throttle_classes (rate limiting)"
    cwe: CWE-400
    severity: medium
    pattern_type: ast_structural
    route_decorator: "class.*APIView"
    missing_decorators:
      - "throttle_classes"
    suggestion: "Add throttle_classes = [AnonRateThrottle, UserRateThrottle] to public views"

  - id: registry/drf/sqli/filter-raw
    title: "SQL Injection via DRF FilterBackend with raw SQL"
    cwe: CWE-89
    severity: critical
    pattern_type: taint_sink
    sinks:
      - queryset.filter(id__in=request.query_params
    suggestion: "Use DjangoFilterBackend with explicit filter fields; validate query param types"

  - id: registry/drf/auth/token-in-url
    title: "Authentication token in URL query parameter"
    cwe: CWE-598
    severity: medium
    pattern_type: taint_sink
    sinks:
      - QueryAuthentication(
      - token=request.query_params.get('token
    suggestion: "Pass tokens in Authorization headers, not URL parameters"

  - id: registry/drf/serializer/write-only-missing
    title: "Password field without write_only=True"
    cwe: CWE-200
    severity: high
    pattern_type: regex
    regex: "password.*=.*CharField\\((?!.*write_only=True)"
    suggestion: "Set write_only=True on password fields to prevent exposure in responses"

  - id: registry/drf/auth/anon-rate-no-limit
    title: "Anonymous rate throttle set to unlimited"
    cwe: CWE-400
    severity: high
    pattern_type: regex
    regex: "'anon':\\s*'\\d+/(?:day|hour|minute|second)'"
    suggestion: "Set appropriate rate limits for anonymous users to prevent brute-force"

  - id: registry/drf/viewset/unsafe-partial-update
    title: "PATCH endpoint allows updating ownership field"
    cwe: CWE-639
    severity: high
    pattern_type: taint_sink
    sinks:
      - partial=True
    suggestion: "Explicitly exclude ownership fields (user, owner, created_by) from PATCH operations"

  - id: registry/drf/nested/write-unrestricted
    title: "Writable nested serializer without depth restriction"
    cwe: CWE-20
    severity: medium
    pattern_type: taint_sink
    sinks:
      - depth = 
      - class Meta:
    suggestion: "Set depth only for read-only serializers; use explicit writable nested serializer fields"

  - id: registry/drf/exception/traceback-in-response
    title: "Exception details exposed in API response"
    cwe: CWE-209
    severity: high
    pattern_type: taint_sink
    sinks:
      - ValidationError(str(e))
      - ValidationError({'detail': traceback
    suggestion: "Return generic error messages; log detailed exceptions server-side only"

  - id: registry/drf/auth/jwt-no-blacklist
    title: "JWT refresh tokens without token blacklisting"
    cwe: CWE-613
    severity: high
    pattern_type: regex
    regex: "SIMPLE_JWT.*(?!.*BLACKLIST_AFTER_ROTATION)"
    suggestion: "Enable BLACKLIST_AFTER_ROTATION in SIMPLE_JWT settings"

  - id: registry/drf/upload/unrestricted-file
    title: "File upload via DRF with no type restriction"
    cwe: CWE-434
    severity: high
    pattern_type: taint_sink
    sinks:
      - FileField()
      - ImageField()
    suggestion: "Add content type and extension validation in the serializer validate_<field> method"

  - id: registry/drf/sqli/ordering-user-controlled
    title: "SQL Injection via OrderingFilter with user-controlled field"
    cwe: CWE-89
    severity: high
    pattern_type: taint_sink
    sinks:
      - ordering = request.query_params.get('ordering'
      - ordering_fields = '__all__'
    suggestion: "Restrict ordering_fields to an explicit allowlist; never use '__all__'"

  - id: registry/drf/permission/object-level-missing
    title: "Missing object-level permission check in retrieve"
    cwe: CWE-284
    severity: high
    pattern_type: taint_sink
    sinks:
      - def retrieve(self, request,
    suggestion: "Call self.check_object_permissions(request, obj) in retrieve() methods"

  - id: registry/drf/auth/custom-user-exposed
    title: "Custom User model password field exposed in API"
    cwe: CWE-200
    severity: critical
    pattern_type: taint_sink
    sinks:
      - fields = '__all__'
    suggestion: "Explicitly list fields; always exclude password from serializer fields"
