language: java
framework: spring_boot
version: "1.0"
description: "Spring Boot framework security rules"
rules:
  - id: registry/spring/sqli/jdbctemplate-user
    title: "SQL Injection via JdbcTemplate.query() with user string"
    cwe: CWE-89
    severity: critical
    pattern_type: taint_sink
    sinks:
      - jdbcTemplate.query("SELECT
      - jdbcTemplate.queryForObject("SELECT
      - jdbcTemplate.update("UPDATE
    suggestion: "Use JdbcTemplate with ? placeholders: jdbcTemplate.query('SELECT * FROM t WHERE id = ?', id)"

  - id: registry/spring/sqli/hibernate-hql-user
    title: "HQL Injection via Hibernate createQuery with user string"
    cwe: CWE-89
    severity: critical
    pattern_type: taint_sink
    sinks:
      - session.createQuery("from
      - em.createQuery("SELECT
      - entityManager.createQuery("from
    suggestion: "Use named parameters: session.createQuery('FROM User WHERE id = :id').setParameter('id', id)"

  - id: registry/spring/auth/missing-preauthorize
    title: "Spring endpoint without @PreAuthorize or @Secured"
    cwe: CWE-862
    severity: high
    pattern_type: regex
    regex: "@(?:GetMapping|PostMapping|PutMapping|DeleteMapping|RequestMapping)(?!.*@PreAuthorize|.*@Secured)"
    suggestion: "Add @PreAuthorize('hasRole(ADMIN)') or @Secured('ROLE_USER') to protect endpoints"

  - id: registry/spring/idor/repository-findbyid
    title: "IDOR via repository.findById without ownership check"
    cwe: CWE-639
    severity: high
    pattern_type: taint_sink
    sinks:
      - repository.findById(id
      - userRepo.findById(Long.parseLong(
    suggestion: "Verify the authenticated user owns the requested resource before returning it"

  - id: registry/spring/ssrf/resttemplate-user
    title: "SSRF via RestTemplate with user-controlled URL"
    cwe: CWE-918
    severity: high
    pattern_type: taint_sink
    sinks:
      - restTemplate.getForObject(url,
      - restTemplate.postForObject(userUrl,
    suggestion: "Validate URLs against an allowlist before using RestTemplate"

  - id: registry/spring/credentials/hardcoded
    title: "Hardcoded database or API credentials in Spring config"
    cwe: CWE-798
    severity: critical
    pattern_type: regex
    regex: "spring\\.datasource\\.password\\s*=\\s*[^$#\\s]{1,64}"
    suggestion: "Use environment variables or Spring Vault for credentials"

  - id: registry/spring/deserialization/java-object
    title: "Unsafe Java Object Deserialization"
    cwe: CWE-502
    severity: critical
    pattern_type: taint_sink
    sinks:
      - ObjectInputStream(request.getInputStream
      - new ObjectInputStream(
    suggestion: "Use a safe deserialization library or implement a JEP-290 filter"

  - id: registry/spring/csrf/disabled
    title: "CSRF protection disabled in Spring Security"
    cwe: CWE-352
    severity: high
    pattern_type: regex
    regex: "\\.csrf\\(\\)\\.disable\\(\\)"
    suggestion: "Enable CSRF protection or use stateless JWT authentication with proper Origin checks"

  - id: registry/spring/cors/allow-all
    title: "Spring CORS configured for all origins"
    cwe: CWE-346
    severity: high
    pattern_type: regex
    regex: "@CrossOrigin\\(origins\\s*=\\s*['\"]\\*['\"]|allowedOrigins\\(\"\\*\"\\)"
    suggestion: "Restrict allowed origins to known trusted domains"

  - id: registry/spring/xss/requestparam-reflected
    title: "XSS via RequestParam reflected without encoding"
    cwe: CWE-79
    severity: high
    pattern_type: taint_sink
    sinks:
      - return "Hello " + name
      - model.addAttribute("msg", userInput
    suggestion: "Use HtmlUtils.htmlEscape() or Thymeleaf's auto-escaping"

  - id: registry/spring/actuator/exposed
    title: "Spring Actuator endpoints exposed without security"
    cwe: CWE-200
    severity: high
    pattern_type: regex
    regex: "management\\.endpoints\\.web\\.exposure\\.include\\s*=\\s*\\*"
    suggestion: "Restrict actuator exposure: management.endpoints.web.exposure.include=health,info"

  - id: registry/spring/path/traversal
    title: "Path Traversal via user-controlled file path in Spring"
    cwe: CWE-22
    severity: critical
    pattern_type: taint_sink
    sinks:
      - new File(request.getParameter(
      - Paths.get(request.getParameter(
    suggestion: "Normalize paths and verify they start with the allowed base directory"

  - id: registry/spring/jwt/weak-secret
    title: "Weak or hardcoded JWT secret in Spring application"
    cwe: CWE-798
    severity: critical
    pattern_type: taint_sink
    sinks:
      - setSigningKey("secret"
      - setSigningKey("password"
      - secret = "secret"
      - jwt.secret=secret
    suggestion: "Use strong random secrets from secure configuration providers and rotate regularly"

  - id: registry/spring/xxe/documentbuilderfactory
    title: "XXE risk via insecure DocumentBuilderFactory configuration"
    cwe: CWE-611
    severity: high
    pattern_type: taint_sink
    sinks:
      - DocumentBuilderFactory.newInstance()
      - setFeature("http://apache.org/xml/features/disallow-doctype-decl", false)
      - setExpandEntityReferences(true)
    suggestion: "Disable DTDs/entities and enable secure processing on XML parsers"

  - id: registry/spring/redirect/open-redirect
    title: "Open Redirect via redirect: prefix with user-controlled target"
    cwe: CWE-601
    severity: high
    pattern_type: taint_sink
    sinks:
      - return "redirect:" +
      - RedirectView(request.getParameter(
      - response.sendRedirect(request.getParameter(
      - request.getParameter("next")
      - request.getParameter("redirect")
    suggestion: "Validate redirect targets with strict allowlists and permit only local paths"

  - id: registry/spring/upload/unrestricted-file-upload
    title: "Unrestricted file upload via MultipartFile without validation"
    cwe: CWE-434
    severity: high
    pattern_type: taint_sink
    sinks:
      - MultipartFile file
      - file.transferTo(new File(
      - Files.copy(file.getInputStream()
    suggestion: "Validate extension/MIME/content, randomize storage names, and store outside web root"

  - id: registry/spring/crypto/weak-hash
    title: "Weak password hashing algorithm used in Spring code"
    cwe: CWE-328
    severity: high
    pattern_type: taint_sink
    sinks:
      - MessageDigest.getInstance("MD5")
      - MessageDigest.getInstance("SHA-1")
      - new Md5PasswordEncoder(
    suggestion: "Use BCrypt/Argon2 for passwords and SHA-256+ for integrity use-cases"

  - id: registry/spring/headers/missing-csp
    title: "Missing Content-Security-Policy header in Spring response"
    cwe: CWE-693
    severity: medium
    pattern_type: taint_sink
    sinks:
      - HttpSecurity headers(
      - response.setHeader("Content-Security-Policy"
    suggestion: "Configure CSP in Spring Security headers with strict directives"

  - id: registry/spring/ssrf/webclient-user-url
    title: "SSRF via WebClient using user-controlled URL"
    cwe: CWE-918
    severity: high
    pattern_type: taint_sink
    sinks:
      - webClient.get().uri(url)
      - webClient.post().uri(request.getParameter(
      - WebClient.create(request.getParameter(
    suggestion: "Resolve and validate hosts/IP ranges before making outbound HTTP calls"

  - id: registry/spring/mass-assignment/modelattribute
    title: "Mass assignment risk via @ModelAttribute binding"
    cwe: CWE-915
    severity: high
    pattern_type: taint_sink
    sinks:
      - @ModelAttribute
      - BeanUtils.copyProperties(request
      - objectMapper.convertValue(requestBody,
    suggestion: "Bind only allowlisted fields and use dedicated DTOs"

  - id: registry/spring/el/spel-user-input
    title: "Expression injection via SpEL parser and user input"
    cwe: CWE-94
    severity: critical
    pattern_type: taint_sink
    sinks:
      - parser.parseExpression(request.getParameter(
      - expressionParser.parseExpression(userInput)
      - new SpelExpressionParser()
    suggestion: "Never evaluate untrusted SpEL expressions; use explicit logic paths instead"

  - id: registry/spring/cache/key-user-control
    title: "Cache key manipulation with untrusted user input"
    cwe: CWE-639
    severity: medium
    pattern_type: taint_sink
    sinks:
      - @Cacheable(key = "#request"
      - @CacheEvict(key = "#id")
      - cache.put(request.getParameter(
    suggestion: "Derive cache keys from validated canonical identifiers only"

  - id: registry/spring/ssrf/url-openconnection
    title: "SSRF via URL.openConnection with user-controlled URL"
    cwe: CWE-918
    severity: high
    pattern_type: regex
    regex: "(?:new\\s+URL\\(.*request\\.getParameter|URL\\(.*request\\.getParameter|openConnection\\(\\)|openStream\\(\\))"
    suggestion: "Validate URLs against an allowlist. Never pass user-controlled URLs directly to URL.openConnection()."

  - id: registry/spring/redirect/user-controlled
    title: "Open Redirect via user-controlled redirect URL"
    cwe: CWE-601
    severity: high
    pattern_type: regex
    regex: "(?:sendRedirect\\(|redirect:|ModelAndView\\().*(?:request\\.getParameter|request\\.getQuery|request\\.getHeader)"
    suggestion: "Validate redirect URLs against a fixed allowlist. Never redirect to user-controlled URLs."

  - id: registry/spring/session/fixation
    title: "Session fixation — session not invalidated after login"
    cwe: CWE-384
    severity: medium
    pattern_type: regex
    regex: "(?:request\\.getSession\\(\\)|HttpSession)(?!.*\\.invalidate\\(\\))"
    suggestion: "Invalidate the session after authentication: request.getSession().invalidate()"

  - id: registry/spring/info-leak/stacktrace
    title: "Stack trace / exception details exposed in error response"
    cwe: CWE-209
    severity: medium
    pattern_type: regex
    regex: "(?:e\\.printStackTrace\\(\\)|e\\.getMessage\\(\\)|ex\\.getMessage\\(\\)|printStackTrace\\(\\))"
    suggestion: "Log detailed errors server-side. Return generic error messages to clients."

  - id: registry/spring/log/injection
    title: "Log injection via user-controlled data in log statements"
    cwe: CWE-117
    severity: medium
    pattern_type: regex
    regex: "(?:log\\.(?:info|warn|error|debug|trace)|logger\\.(?:info|warn|error|debug|trace))\\([^)]*request\\.getParameter"
    suggestion: "Sanitize or encode user input before logging. Use parameterized logging."

  - id: registry/spring/jwt/hardcoded-secret-string
    title: "Hardcoded JWT or HMAC signing secret in source code"
    cwe: CWE-798
    severity: critical
    pattern_type: regex
    regex: "(?:String\\s+SECRET\\s*=|String\\s+JWT_SECRET\\s*=|String\\s+SIGNING_KEY\\s*=).*\"[A-Za-z0-9+/=]{8,}\""
    suggestion: "Move secrets to environment variables or Spring Vault. Rotate immediately if committed."
