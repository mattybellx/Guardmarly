# Ruby security rules — pattern-based (AST analyzer planned for v0.2)
rules:
  - id: RUBY-CWE-78
    metadata:
      title: "Command injection via backticks or system()"
      severity: CRITICAL
      cwe: "CWE-78"
      description: "User input flowing into shell command execution"
    target_layers: [ruby]
    patterns:
      - pattern: '`.*#\{.*\}.*`'
        message: "Backtick command interpolation with potential user input"
      - pattern: 'system\s*\(?\s*["\'].*#\{'
        message: "system() with interpolated user input"
      - pattern: 'exec\s*\(?\s*["\'].*#\{'
        message: "exec() with interpolated user input"

  - id: RUBY-CWE-89
    metadata:
      title: "SQL injection via string interpolation"
      severity: CRITICAL
      cwe: "CWE-89"
      description: "SQL query built with string interpolation"
    target_layers: [ruby]
    patterns:
      - pattern: '\.where\s*\(\s*["\'].*#\{'
        message: "ActiveRecord where() with interpolation — use ? placeholders"
      - pattern: '\.find_by_sql\s*\(\s*["\'].*#\{'
        message: "Raw SQL with interpolation"

  - id: RUBY-CWE-798
    metadata:
      title: "Hardcoded secret in Ruby source"
      severity: HIGH
      cwe: "CWE-798"
      description: "API key, token, or password hardcoded in source"
    target_layers: [ruby]
    patterns:
      - pattern: '(API_KEY|SECRET|TOKEN|PASSWORD)\s*=\s*["\'][A-Za-z0-9_\-]{8,}'
        message: "Hardcoded credential — use ENV['VAR'] instead"
