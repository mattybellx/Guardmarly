repos:
  - repo: https://github.com/mattybellx/Guardmarly
    rev: v2.1.6
    hooks:
      - id: guardmarly
        name: Guardmarly SAST
        language: python
        entry: guardmarly
        args: [--fail-on, high]
        types: [python, javascript, typescript]
        pass_filenames: false
        additional_dependencies: []
