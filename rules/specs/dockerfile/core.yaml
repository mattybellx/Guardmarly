# Guardmarly Spec — Dockerfile Security
spec_version: 1
language: dockerfile
framework: ""
description: "Dockerfile security best practices and vulnerability patterns"

sources:
  - id: dockerfile_arg
    pattern: "ARG $X|ARG $X=$DEFAULT"
    kind: build_arg
  - id: dockerfile_env_input
    pattern: "ENV $X=$Y"
    kind: environment

sinks:
  # Running as root
  - id: dockerfile_root_user
    pattern: "USER root|USER 0"
    cwe: CWE-250
    severity: medium
    note: "Container runs as root — least-privilege violation"
  # Exposing sensitive ports
  - id: dockerfile_expose_all
    pattern: "EXPOSE 0-65535|EXPOSE 1-65535"
    cwe: CWE-200
    severity: low
  # ADD with remote URLs
  - id: dockerfile_add_url
    pattern: "ADD https://|ADD http://"
    cwe: CWE-494
    severity: medium
    note: "ADD with remote URLs can pull untrusted content"
  # Latest tag
  - id: dockerfile_latest_tag
    pattern: "FROM $IMAGE:latest|FROM $IMAGE"
    cwe: CWE-1104
    severity: low
    note: "Using :latest tag means builds are not reproducible"
  # Secrets in ENV
  - id: dockerfile_env_secret
    pattern: "ENV $X=.*secret|ENV $X=.*password|ENV $X=.*token|ENV $X=.*key"
    cwe: CWE-798
    severity: high
    note: "Hardcoded secrets in Dockerfile ENV instructions"
  # Insecure COPY
  - id: dockerfile_copy_wildcard
    pattern: "COPY . /|COPY * /"
    cwe: CWE-265
    severity: low
    note: "Wildcard COPY may include sensitive files"
  # HEALTHCHECK missing
  - id: dockerfile_no_healthcheck
    pattern: "FROM $IMAGE"  # heuristic: files without HEALTHCHECK
    cwe: CWE-1068
    severity: low

sanitizers:
  - id: dockerfile_nonroot_user
    pattern: "USER $NONROOT|USER 1000|USER 1001|USER app|USER node|USER nobody"
  - id: dockerfile_healthcheck
    pattern: "HEALTHCHECK|HEALTHCHECK --interval"
  - id: dockerfile_pinned_version
    pattern: "FROM $IMAGE:$VERSION@sha256:|FROM $IMAGE:$VERSION"
  - id: dockerfile_copy_narrow
    pattern: "COPY package.json|COPY requirements.txt|COPY go.mod|COPY pom.xml"

propagators:
  - id: dockerfile_build_arg
    pattern: "ARG $X|--build-arg $X=$VAL"
