# Guardmarly Spec — Laravel Framework (PHP)
spec_version: 1
language: php
framework: laravel
description: "Laravel security patterns for IDOR and injection detection"

sources:
  - id: laravel_request_input
    pattern: "$request->input($X)|$request->get($X)|request($X)|request()->input($X)"
    kind: http_param
  - id: laravel_request_query
    pattern: "$request->query($X)|$request->query->get($X)"
    kind: http_param
  - id: laravel_request_post
    pattern: "$request->post($X)|$request->json($X)|$request->all()"
    kind: http_body
  - id: laravel_request_header
    pattern: "$request->header($X)|$request->headers->get($X)"
    kind: http_header
  - id: laravel_request_cookie
    pattern: "$request->cookie($X)|Cookie::get($X)"
    kind: http_cookie
  - id: laravel_request_file
    pattern: "$request->file($X)|$request->hasFile($X)"
    kind: file_upload
  - id: laravel_route_param
    pattern: "$request->route($X)|$request->route()->parameter($X)"
    kind: route_param
  - id: laravel_url_segment
    pattern: "$request->segment($X)|request()->segment($X)"
    kind: route_param
  - id: laravel_env
    pattern: "env($X)|config($X)|$_ENV[$X]|$_SERVER[$X]|getenv($X)"
    kind: environment

sinks:
  # SQL injection (Eloquent / Query Builder)
  - id: laravel_raw_query
    pattern: "DB::raw($X)|DB::select($X)|DB::statement($X)|DB::unprepared($X)"
    cwe: CWE-89
    severity: critical
  - id: laravel_where_raw
    pattern: "->whereRaw($X)|->orWhereRaw($X)|->havingRaw($X)|->orderByRaw($X)"
    cwe: CWE-89
    severity: critical
  - id: laravel_eloquent_raw
    pattern: "Model::whereRaw($X)|->selectRaw($X)|->fromRaw($X)"
    cwe: CWE-89
    severity: high
  # Command injection
  - id: laravel_exec
    pattern: "exec($X)|shell_exec($X)|system($X)|passthru($X)|popen($X)"
    cwe: CWE-78
    severity: critical
  - id: laravel_process
    pattern: "Process::run($X)|Process::pipe($X)|Symfony\Component\Process\Process"
    cwe: CWE-78
    severity: critical
  # SSRF
  - id: laravel_http_client
    pattern: "Http::get($X)|Http::post($X)|Http::withOptions|Http::asForm"
    cwe: CWE-918
    severity: high
  - id: laravel_guzzle
    pattern: "new GuzzleHttp\Client|$client->request($X)|$client->get($X)"
    cwe: CWE-918
    severity: high
  # Path traversal
  - id: laravel_file_get
    pattern: "file_get_contents($X)|Storage::get($X)|Storage::disk($D)->get($X)"
    cwe: CWE-22
    severity: high
  - id: laravel_file_put
    pattern: "file_put_contents($X)|Storage::put($X)|Storage::disk($D)->put($X)"
    cwe: CWE-22
    severity: high
  - id: laravel_response_download
    pattern: "response()->download($X)|Storage::download($X)"
    cwe: CWE-22
    severity: medium
  # Deserialization
  - id: laravel_unserialize
    pattern: "unserialize($X)"
    cwe: CWE-502
    severity: critical
  # XSS / response
  - id: laravel_blade_raw
    pattern: "{!! $X !!}|Blade::render($X)"
    cwe: CWE-79
    severity: medium
  - id: laravel_redirect
    pattern: "redirect($X)|redirect()->to($X)|redirect()->away($X)"
    cwe: CWE-601
    severity: medium

sanitizers:
  - id: laravel_eloquent_binding
    pattern: "Model::find($ID)|Model::findOrFail($ID)|->find($ID)"
  - id: laravel_parameterized
    pattern: "DB::select($SQL, $BINDINGS)|DB::statement($SQL, $BINDINGS)|->where($COL, $OP, $VAL)"
  - id: laravel_escape
    pattern: "e($X)|{{ $X }}|htmlspecialchars($X)"
  - id: laravel_csrf
    pattern: "@csrf|csrf_field()|csrf_token()"
  - id: laravel_validation
    pattern: "$request->validate($RULES)|Validator::make($X, $RULES)|$this->validate($X, $RULES)"
  - id: laravel_sanitize
    pattern: "filter_var($X, FILTER_SANITIZE|strip_tags($X)"

propagators:
  - id: php_string_concat
    pattern: "$X . $Y|$X .= $Y"
  - id: php_double_quote
    pattern: "\"$X\"|\"$VAR\""
  - id: php_sprintf
    pattern: "sprintf($FMT, $X)"
  - id: php_variable_assign
    pattern: "$VAR = $X"
  - id: php_return
    pattern: "return $X"

route_extractors:
  - id: laravel_route_get
    pattern: "Route::get($ROUTE, $HANDLER)|Route::get($ROUTE, [$CONTROLLER, $METHOD])"
    captures: [route, handler]
    framework: laravel
  - id: laravel_route_post
    pattern: "Route::post($ROUTE, $HANDLER)"
    captures: [route, handler]
    framework: laravel
  - id: laravel_route_resource
    pattern: "Route::resource($NAME, $CONTROLLER)|Route::apiResource($NAME, $CONTROLLER)"
    captures: [name, controller]
    framework: laravel

auth_checks:
  - id: laravel_auth_middleware
    pattern: "->middleware('auth')|middleware('auth:sanctum')|middleware('auth:api')"
  - id: laravel_can_middleware
    pattern: "->middleware('can:$PERMISSION')|middleware('can:$ROLE')"
  - id: laravel_auth_check
    pattern: "auth()->check()|Auth::check()|auth()->user()|Auth::user()"
  - id: laravel_policy_authorize
    pattern: "$this->authorize($ACTION, $MODEL)|Gate::authorize($ACTION)|Gate::allows($ACTION)"
  - id: laravel_sanctum
    pattern: "HasApiTokens|Laravel\Sanctum|auth:sanctum"
  - id: laravel_guest_middleware
    pattern: "->middleware('guest')"
    effect: "exempt"

ownership_checks:
  - id: laravel_owner_scope
    pattern: "->where('user_id', auth()->id())|->where('owner_id', Auth::id())"
  - id: laravel_policy_view
    pattern: "public function view(User $user, $MODEL $model): bool"
  - id: laravel_policy_update
    pattern: "return $user->id === $model->user_id|return $user->id === $model->owner_id"

middleware:
  - id: laravel_auth_middleware_reg
    pattern: "Kernel::class|protected $middleware|protected $middlewareGroups"
  - id: laravel_cors
    pattern: "HandleCors|CorsMiddleware"
  - id: laravel_csrf_middleware
    pattern: "VerifyCsrfToken|App\Http\Middleware\VerifyCsrfToken"
  - id: laravel_throttle
    pattern: "ThrottleRequests|throttle:"
