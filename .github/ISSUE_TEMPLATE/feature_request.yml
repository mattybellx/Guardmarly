name: ✨ Feature Request
description: Suggest a new rule, output format, or workflow improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or missing feature are you running into?
      placeholder: "I wish guardmarly could detect..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other tools you've tried?

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Who is affected, and how often does this matter in real workflows?
      placeholder: "Affects CI triage on every PR in a monorepo with ~5k files..."

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true when this request is complete?
      placeholder: |
        - [ ] New flag appears in --help
        - [ ] Added tests for positive + negative behavior
        - [ ] README docs updated

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New detection rule
        - Fewer false positives
        - New output format
        - CLI / workflow
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
