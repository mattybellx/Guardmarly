name: 🐛 Bug Report
description: Report a false positive, false negative, crash, or unexpected behaviour
labels: ["bug"]
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - False positive (flagged safe code)
        - False negative (missed real vulnerability)
        - Crash / exception
        - Performance regression
        - Other
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Language / surface area
      options:
        - Python analyzer
        - JavaScript / TypeScript analyzer
        - CLI / config
        - Reporter (text / JSON / SARIF)
        - VS Code extension
        - Benchmark harness
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
      placeholder: "guardmarly flagged a safe pattern as CWE-89..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction command
      description: Paste the exact command used (including flags)
      placeholder: "guardmarly src/ --format json --js-backend structural"
      render: bash
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal code snippet
      description: Paste the smallest code that reproduces the issue
      render: python
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: guardmarly output
      description: Paste the full output (text or JSON)
      render: text

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should guardmarly report instead?

  - type: input
    id: version
    attributes:
      label: Version
      description: "Run `guardmarly --version`"
      placeholder: "guardmarly 1.2.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: "Run `python --version`"
      placeholder: "Python 3.11.x"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues to avoid duplicates.
          required: true
        - label: I included a minimal reproducible snippet.
          required: true
        - label: I removed private secrets/tokens from pasted output.
          required: true
