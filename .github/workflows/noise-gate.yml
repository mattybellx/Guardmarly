name: Noise Gate — Confidence Filter Safety

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noise-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ansede-static
        run: pip install -e ".[dev]" --quiet

      - name: Run noise gate — 3 random repos from pool of 20
        run: python benchmarks/noise_gate.py --random 3
