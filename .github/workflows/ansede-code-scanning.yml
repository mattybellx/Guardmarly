# guardmarly — GitHub Code Scanning Integration
# Upload SARIF results to the Security > Code Scanning tab.
# For full documentation see docs/github-code-scanning-sarif-integration.md
name: Guardmarly Code Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # weekly: Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Guardmarly static analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install guardmarly
        run: pip install guardmarly

      - name: Run guardmarly scan
        run: |
          guardmarly scan . \
            --format json \
            --output guardmarly.json \
            --fail-on never \
            --exclude node_modules \
            --exclude .venv \
            --exclude __pycache__ \
            --exclude src \
            --exclude guardmarly_rust_core

      - name: Convert JSON to SARIF
        run: python .github/scripts/json_to_sarif.py

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: guardmarly.sarif
          category: guardmarly
