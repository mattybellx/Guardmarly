name: Production Compilation & Artifact Distribution

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test-suite:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests/ -q --tb=short

  compile-binaries:
    name: Compile Production Binary For ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test-suite
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: guardmarly-linux-amd64
          - os: macos-latest
            artifact_name: guardmarly-macos-universal
          - os: windows-latest
            artifact_name: guardmarly-windows-amd64.exe

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Production Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Development & Compiling Bundles
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .

      - name: Execute Binary Packaging Engine
        run: |
          pyinstaller --onefile --name="${{ matrix.artifact_name }}" src/guardmarly/cli.py

      - name: Upload Binary Stable Builds As Workflow Storage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*

  publish-release:
    name: Aggregate and Generate Official GitHub Release Tag
    needs: [compile-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: accumulated_dist/

      - name: Generate Changelog from CHANGELOG.md
        run: |
          awk '/^## /{if(c++) exit} {if(c) print}' CHANGELOG.md > accumulated_dist/RELEASE_NOTES.md || echo "No changelog section found" > accumulated_dist/RELEASE_NOTES.md

      - name: Compute Cryptographic SHA256 Verification Fingerprints
        run: |
          cd accumulated_dist/
          find . -type f ! -name "SHA256SUMS.txt" ! -name "RELEASE_NOTES.md" -exec sha256sum {} \; > SHA256SUMS.txt

      - name: Generate GitHub Official Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: accumulated_dist/RELEASE_NOTES.md
          files: |
            accumulated_dist/**/*
            accumulated_dist/SHA256SUMS.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
