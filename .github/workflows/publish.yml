name: Publish to PyPI

# Triggered by Release workflow success, or manual dispatch for republish.
# Uses PyPI Trusted Publishing (OIDC) as primary path with API token fallback.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to PyPI
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install --upgrade build twine

      - name: Install project for smoke tests
        run: pip install -e ".[test]"

      - name: Run publish smoke tests
        run: python -m pytest tests/test_cli.py tests/test_reporters.py -q

      - name: Build distribution
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        id: publish_trusted
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Publish to PyPI (API token fallback)
        id: publish_token
        if: failure() && steps.publish_trusted.conclusion == 'failure'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Verify PyPI publication
        if: success() || (steps.publish_token.conclusion == 'success')
        run: |
          sleep 15
          pip install --dry-run --no-deps "guardmarly==$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" 2>&1 || echo "Package may still be indexing on PyPI..."
