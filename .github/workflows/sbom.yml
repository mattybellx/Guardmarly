# SBOM Generation & Supply Chain Attestation
# Generates CycloneDX SBOM on every release tag and publishes as a release asset.
# Also generates SLSA provenance via GitHub's built-in attestation.

name: SBOM & Supply Chain

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  sbom:
    name: Generate SBOM & Attestations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py \
            --format json \
            --schema-version 1.5 \
            -- output guardmarly-sbom.cdx.json

      - name: Upload SBOM as Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: guardmarly-sbom.cdx.json

      - name: Generate SLSA Provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            guardmarly-sbom.cdx.json

      - name: Upload SBOM as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: guardmarly-sbom.cdx.json
          retention-days: 90
