name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Full test suite on all OS/Python combos ──────────────────────────
  verify-and-test:
    name: Verify (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev,treesitter]"

      - name: Run complete test suite
        run: python -m pytest tests/ --ignore=tests/test_real_world_compare.py --ignore=tests/test_external_corpus.py --tb=short -q

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ --ignore=E501,E402,F401,F811,E701,E702,E741,F821 --quiet

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ── Unit tests on every Python version ──────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests/ --ignore=tests/test_real_world_compare.py --ignore=tests/test_external_corpus.py --tb=short -q
      - name: CVE recall (NVD corpus)
        run: python -m benchmarks.nvd_benchmark --fail-under 60 --quiet

  # ── OWASP Benchmark gate ────────────────────────────────────────────
  owasp-benchmark:
    name: OWASP Benchmark (recall >= 85%)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run OWASP benchmark
        run: python -m benchmarks.owasp_fast
      - name: Verify OWASP recall
        run: |
          python -c "
          import json
          d = json.load(open('benchmarks/owasp_scorecard.json'))
          assert d['tpr_pct'] >= 85, f\"OWASP recall {d['tpr_pct']}% < 85%\"
          print(f\"OWASP recall: {d['tpr_pct']}% — PASS\")
          "

  # ── Docs build ──────────────────────────────────────────────────────
  mkdocs-build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material
      - name: Build site
        run: mkdocs build

  # ── Quality gates ───────────────────────────────────────────────────
  quality:
    name: Quality benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Quality benchmark
        run: python -m benchmarks.quality_benchmark --fail-under 100 --quiet

  external-corpus:
    name: External corpus benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: External corpus benchmark
        run: python -m benchmarks.external_corpus --manifest benchmarks/external_manifest.json --fail-under 100 --quiet

  # ── Performance ────────────────────────────────────────────────────
  perf-smoke:
    name: Performance smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Performance benchmark
        run: python -m benchmarks.perf_benchmark --iterations 10 --quiet --json

  # ── Engine comparison ───────────────────────────────────────────────
  engine-compare:
    name: Engine comparison (v1 vs v2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Compare engines
        run: python .github/scripts/compare_engines.py

  # ── Language parity ─────────────────────────────────────────────────
  language-parity:
    name: Language parity (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [go, java, csharp]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Language parity scan
        run: python .github/scripts/language_parity_check.py ${{ matrix.lang }}

  # ── Self-scan with SARIF upload ─────────────────────────────────────
  self-scan:
    name: Self-scan (SARIF)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Self-scan
        run: ansede-static src/ --format sarif --output ansede-self-scan.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ansede-self-scan.sarif
