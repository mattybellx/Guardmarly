name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write   # for SARIF upload

jobs:
  # ── Unit tests on every supported Python version ─────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/ --tb=short -q
      - name: CVE pattern benchmark
        run: python -m benchmarks.nvd_benchmark --fail-under 90 --quiet

  quality:
    name: Quality benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Quality benchmark
        run: python -m benchmarks.quality_benchmark --fail-under 100 --quiet

  external-corpus:
    name: External corpus benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: External corpus benchmark
        run: python -m benchmarks.external_corpus --manifest benchmarks/external_manifest.json --fail-under 100 --quiet

  perf-smoke:
    name: Performance smoke benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Performance smoke benchmark
        run: python -m benchmarks.perf_benchmark --iterations 10 --quiet --json

  platform-smoke:
    name: Platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke tests
        run: pytest tests/test_cli.py tests/test_reporters.py tests/test_config.py -q

  extension:
    name: VS Code extension build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm install
      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

  # ── Self-scan: scan ansede-static with ansede-static ─────────────────────
  scan:
    name: Self-scan (SARIF)
    runs-on: ubuntu-latest
    needs: [test, quality, external-corpus, perf-smoke, platform-smoke, extension]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Scan src/
        run: ansede-static src/ --format sarif --output ansede.sarif --fail-on never
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ansede.sarif
          category: ansede-static
