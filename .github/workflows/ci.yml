name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write   # for SARIF upload

jobs:
  # ── Unit tests on every supported Python version ─────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests/test_js.py tests/test_python.py tests/test_audit_engine.py tests/test_community_rules.py tests/test_cache.py tests/test_cli.py tests/test_config.py tests/test_reporters.py tests/test_triage.py tests/test_auto_rules.py tests/test_clustering.py tests/test_confidence.py tests/test_cpg.py tests/test_cross_file.py tests/test_cvss.py tests/test_datascience.py tests/test_entropy.py tests/test_explain.py tests/test_incremental.py tests/test_ifds.py tests/test_ifds_e2e_integration.py --tb=short -q
      - name: CVE pattern benchmark
        run: python -m benchmarks.nvd_benchmark --fail-under 70 --quiet

  quality:
    name: Quality benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Quality benchmark
        run: python -m benchmarks.quality_benchmark --fail-under 100 --quiet

  external-corpus:
    name: External corpus benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: External corpus benchmark
        run: python -m benchmarks.external_corpus --manifest benchmarks/external_manifest.json --fail-under 100 --quiet

  perf-smoke:
    name: Performance smoke benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Performance smoke benchmark
        run: python -m benchmarks.perf_benchmark --iterations 10 --quiet --json
      - name: Performance regression check (DIR-5.2)
        run: python benchmarks/perf_regression_check.py

  sarif-quality:
    name: SARIF trace quality gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate SARIF trace coverage
        run: python .github/scripts/validate_sarif_trace_coverage.py

  engine-compare:
    name: Dual-engine comparison (v1 vs v2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Compare engines
        run: python .github/scripts/compare_engines.py

  language-parity:
    name: Language parity (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [go, java, csharp, ruby]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Language parity scan
        run: python .github/scripts/language_parity_check.py ${{ matrix.lang }}

  platform-smoke:
    name: Platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke tests
        run: pytest tests/test_cli.py tests/test_reporters.py tests/test_config.py -q

  binary-guardrails:
    name: Binary guardrails (DIR-5.3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Build wheel
        run: pip install build && python -m build
      - name: Check guardrails
        run: python tools/check_binary_guardrails.py

  extension:
    name: VS Code extension build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm install
      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

  # ── Self-scan: scan ansede-static with ansede-static ─────────────────────
  scan:
    name: Self-scan (SARIF)
    runs-on: ubuntu-latest
    needs: [test, quality, external-corpus, perf-smoke, binary-guardrails, platform-smoke, extension]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Scan src/
        run: ansede-static src/ --format json --output ansede.json --fail-on never
      - name: Generate SARIF from JSON
        run: python .github/scripts/json_to_sarif.py
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ansede.sarif
          category: ansede-static
