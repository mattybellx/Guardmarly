name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write   # for SARIF upload

jobs:
  verify-and-test:
    name: Verify (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Environment ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Hardened Dependency Manifest
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev]"

      - name: Run Complete Test Suite
        run: python -m pytest tests/test_async_scanner.py tests/test_audit_engine.py tests/test_cache.py tests/test_cli.py tests/test_clustering.py tests/test_community_rules.py tests/test_confidence.py tests/test_config.py tests/test_cross_file.py tests/test_cvss.py tests/test_datascience.py tests/test_entropy.py tests/test_explain.py tests/test_java_csharp_analyzers.py tests/test_js.py tests/test_js_ast.py tests/test_js_minified_project_index.py tests/test_js_structure_cache.py tests/test_noise_policies.py tests/test_phase2_registry_expansion.py tests/test_phase4_diagnostics.py tests/test_python.py tests/test_remediation.py tests/test_reporters.py tests/test_rules.py tests/test_symbolic_guards.py tests/test_triage.py tests/test_yaml_rules.py --tb=short -q

      - name: Upload Coverage Reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ── Unit tests on every supported Python version ─────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests/test_async_scanner.py tests/test_audit_engine.py tests/test_cache.py tests/test_cli.py tests/test_clustering.py tests/test_community_rules.py tests/test_confidence.py tests/test_config.py tests/test_cross_file.py tests/test_cvss.py tests/test_datascience.py tests/test_entropy.py tests/test_explain.py tests/test_java_csharp_analyzers.py tests/test_js.py tests/test_js_ast.py tests/test_js_minified_project_index.py tests/test_js_structure_cache.py tests/test_noise_policies.py tests/test_phase2_registry_expansion.py tests/test_phase4_diagnostics.py tests/test_python.py tests/test_remediation.py tests/test_reporters.py tests/test_rules.py tests/test_symbolic_guards.py tests/test_triage.py tests/test_yaml_rules.py --tb=short -q
      - name: CVE pattern benchmark
        run: python -m benchmarks.nvd_benchmark --fail-under 70 --quiet

  openapi-bridge:
    name: OpenAPI bridge integration test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: OpenAPI bridge tests
        run: python -m pytest tests/test_openapi_bridge.py -q

  mkdocs-build:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material
      - name: Build site
        run: mkdocs build

  quality:
    name: Quality benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Quality benchmark
        run: python -m benchmarks.quality_benchmark --fail-under 100 --quiet

  external-corpus:
    name: External corpus benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: External corpus benchmark
        run: python -m benchmarks.external_corpus --manifest benchmarks/external_manifest.json --fail-under 100 --quiet

  perf-smoke:
    name: Performance smoke benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Performance smoke benchmark
        run: python -m benchmarks.perf_benchmark --iterations 10 --quiet --json
      - name: Performance regression check (DIR-5.2)
        run: python benchmarks/perf_regression_check.py

  sarif-quality:
    name: SARIF trace quality gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate SARIF trace coverage
        run: python .github/scripts/validate_sarif_trace_coverage.py

  engine-compare:
    name: Dual-engine comparison (v1 vs v2)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Compare engines
        run: python .github/scripts/compare_engines.py

  language-parity:
    name: Language parity (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [go, java, csharp, ruby]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Language parity scan
        run: python .github/scripts/language_parity_check.py ${{ matrix.lang }}

  batch-scan:
    name: Sample batch scan (campaign slice)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Scan 5 campaign targets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/batch_scan_repos.py --repos-file benchmarks/campaign_targets_top100.json --limit 5 --max-files-per-repo 300 --with-audit --output .tmp/ci_batch_scan.json --quiet
      - name: Generate summary
        run: |
          python tools/summarize_batch_scan_report.py --input .tmp/ci_batch_scan.json --output .tmp/ci_batch_scan.md

  platform-smoke:
    name: Platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Smoke tests
        run: pytest tests/test_cli.py tests/test_reporters.py tests/test_config.py -q

  binary-guardrails:
    name: Binary guardrails (DIR-5.3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Build wheel
        run: pip install build && python -m build
      - name: Check guardrails
        run: python tools/check_binary_guardrails.py

  extension:
    name: VS Code extension build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm install
      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile

  # ── Self-scan: scan ansede-static with ansede-static ─────────────────────
  scan:
    name: Self-scan (SARIF)
    runs-on: ubuntu-latest
    needs: [test, quality, external-corpus, perf-smoke, binary-guardrails, platform-smoke, extension]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .
      - name: Scan src/
        run: ansede-static src/ --format json --output ansede.json --fail-on never
      - name: Generate SARIF from JSON
        run: python .github/scripts/json_to_sarif.py
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ansede.sarif
          category: ansede-static
