name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Core: tests on all OS/Python combos ──────────────────────────────
  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,treesitter]"
      - name: Run tests
        run: python -m pytest tests/ --ignore=tests/test_real_world_compare.py --ignore=tests/test_external_corpus.py --tb=short -q

  # ── NVD CVE recall gate ────────────────────────────────────────────
  nvd-benchmark:
    name: NVD CVE Recall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev,treesitter]"
      - name: NVD benchmark
        run: python -m benchmarks.nvd_benchmark --fail-under 60 --quiet

  # ── OWASP benchmark gate ────────────────────────────────────────────
  owasp:
    name: OWASP Recall
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev,treesitter]"
      - name: Run OWASP
        run: python -m benchmarks.owasp_fast
      - name: Check recall >= 85%
        run: |
          python -c "
          import json
          d = json.load(open('benchmarks/owasp_scorecard.json'))
          assert d['recall_pct'] >= 85, f\"OWASP recall {d['recall_pct']}% < 85%\"
          print(f\"OWASP recall: {d['recall_pct']}% PASS\")
          "

  # ── Lint + type check ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev,treesitter]" mypy ruff
      - name: Lint
        run: ruff check src/ --ignore=E501,E402,F401,F811,E701,E702,E741,F821 --quiet
      - name: Type check
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

  # ── Docs build ─────────────────────────────────────────────────────
  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install mkdocs mkdocs-material
      - name: Build
        run: mkdocs build

  # ── Engine comparison (v1 vs v2) ────────────────────────────────────
  engine:
    name: Engine Compare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev,treesitter]"
      - name: Compare
        run: python .github/scripts/compare_engines.py
