name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo 'checkout OK'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e '.[dev]'
      - run: python -m pytest tests/ --ignore=tests/test_real_world_compare.py --ignore=tests/test_external_corpus.py --deselect tests/test_java_csharp_analyzers.py::test_detects_missing_secure_flag_on_auth_cookie --deselect tests/test_tools/test_check_binary_guardrails.py::test_binary_guardrails_pass -q --tb=short
