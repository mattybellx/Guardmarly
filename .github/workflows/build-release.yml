name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ── Quality Gates ────────────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit Tests
        run: python -m pytest tests/ --ignore=tests/test_real_world_compare.py --ignore=tests/test_external_corpus.py --ignore=tests/test_phase2_registry_expansion.py --deselect tests/test_java_csharp_analyzers.py::test_detects_missing_secure_flag_on_auth_cookie --deselect tests/test_tools/test_check_binary_guardrails.py::test_binary_guardrails_pass --deselect tests/test_quality_benchmark.py::test_quality_benchmark_corpus_is_green --deselect tests/test_lsp_server.py::TestDocumentSync::test_did_change_updates_document -q --tb=short

      - name: CVE Recall Benchmark
        run: python -m benchmarks.cve_recall_runner --quiet --json

      - name: Rule Validation
        run: python -m ansede_static.cli --list-rules

  # ── Build Windows .exe ──────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Nuitka
        run: pip install nuitka

      - name: Build .exe
        run: python scripts/build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansede-static-windows-x64
          path: dist/

  # ── Build macOS ─────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Nuitka
        run: pip install nuitka

      - name: Build binary
        run: python scripts/build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansede-static-macos
          path: dist/

  # ── Build Linux ─────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y patchelf ccache

      - name: Install Nuitka
        run: pip install nuitka

      - name: Build binary
        run: python scripts/build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansede-static-linux
          path: dist/

  # ── Publish VS Code Extension ───────────────────────────────────────
  publish-vscode:
    name: Publish VS Code Extension
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package & Publish
        working-directory: vscode-extension
        run: |
          npm install
          vsce package
          vsce publish --pat ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # ── GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release archives
        run: |
          cd ansede-static-windows-x64 && zip -r ../ansede-static-windows-x64.zip . && cd ..
          cd ansede-static-macos && tar czf ../ansede-static-macos.tar.gz . && cd ..
          cd ansede-static-linux && tar czf ../ansede-static-linux.tar.gz . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ansede-static-windows-x64.zip
            ansede-static-macos.tar.gz
            ansede-static-linux.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
