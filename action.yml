name: 'guardmarly'
description: 'SAST scanner — detects IDOR, auth bypass, SQLi, path traversal, and 20+ vulnerability categories. Runs locally, no API keys.'
author: 'mattybellx'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'File or directory to scan (default: current directory)'
    required: false
    default: '.'
  fail-on:
    description: 'Exit 1 when any finding at this severity or above is found (critical/high/medium/low/info/never)'
    required: false
    default: 'high'
  format:
    description: 'Output format: text, json, or sarif'
    required: false
    default: 'sarif'
  output:
    description: 'Write output to this file (stdout if omitted). Required for SARIF upload.'
    required: false
    default: 'guardmarly.sarif'
  exclude:
    description: 'Comma-separated path patterns to exclude (e.g. "tests,migrations")'
    required: false
    default: ''
  version:
    description: 'Optional version/ref. With install-source=pypi, install guardmarly==<version>; with install-source=github, install from that git ref.'
    required: false
    default: ''
  install-source:
    description: 'Install source: pypi (default), github, or local'
    required: false
    default: 'pypi'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning (requires contents:write and security-events:write permissions)'
    required: false
    default: 'true'
  post-pr-comments:
    description: 'Post inline review comments on the PR for each finding (requires pull-requests:write permission). Only active on pull_request events.'
    required: false
    default: 'true'
  min-confidence:
    description: 'Only report findings with confidence >= threshold (0.0-1.0). Default 0.65 reduces noise ~60% while keeping all HIGH/CRITICAL.'
    required: false
    default: '0.65'
  all-findings:
    description: 'Show all findings regardless of confidence score (overrides min-confidence).'
    required: false
    default: 'false'
  noise-gate:
    description: 'Enforce a strict web-wild noise quotient ceiling (e.g., 2.0). Fails the CI if the false-positive rate exceeds this limit.'
    required: false
    default: ''
  output-dir:
    description: 'Path to a directory to output multiple formats simultaneously in a single scan pass.'
    required: false
    default: ''
  license-key:
    description: 'guardmarly Pro license key for SARIF/SBOM features'
    required: false
    default: ''

outputs:
  findings-count:
    description: 'Total number of findings across all files'
    value: ${{ steps.scan.outputs.findings_count }}
  sarif-file:
    description: 'Path to the generated SARIF file'
    value: ${{ inputs.output }}

runs:
  using: 'composite'
  steps:
    - name: Install guardmarly
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_INSTALL_SOURCE: ${{ inputs.install-source }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        if [ "$INPUT_INSTALL_SOURCE" = "github" ]; then
          if [ -n "$INPUT_VERSION" ]; then
            pip install --quiet "guardmarly @ git+https://github.com/mattybellx/Guardmarly.git@$INPUT_VERSION"
          else
            pip install --quiet "guardmarly @ git+https://github.com/mattybellx/Guardmarly.git"
          fi
        elif [ "$INPUT_INSTALL_SOURCE" = "local" ]; then
          pip install --quiet "$ACTION_PATH"
        else
          if [ -n "$INPUT_VERSION" ]; then
            pip install --quiet "guardmarly==$INPUT_VERSION" || pip install --quiet "$ACTION_PATH"
          else
            pip install --quiet "guardmarly" || pip install --quiet "$ACTION_PATH"
          fi
        fi

    - name: Run guardmarly
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_NOISE_GATE: ${{ inputs.noise-gate }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        # Build shared exclude flags once
        EXCLUDE_FLAGS=()
        if [ -n "$INPUT_EXCLUDE" ]; then
          for pat in $(echo "$INPUT_EXCLUDE" | tr ',' ' '); do
            EXCLUDE_FLAGS+=(--exclude "$pat")
          done
        fi

        # Primary scan: requested format, written to output file (or stdout)
        ARGS=("$INPUT_PATH" --format "$INPUT_FORMAT" --fail-on never "${EXCLUDE_FLAGS[@]}")
        
        if [ -n "$INPUT_OUTPUT" ]; then
          ARGS+=(--output "$INPUT_OUTPUT")
        fi
        if [ -n "$INPUT_OUTPUT_DIR" ]; then
          ARGS+=(--output-dir "$INPUT_OUTPUT_DIR")
        fi
        if [ -n "$INPUT_NOISE_GATE" ]; then
          ARGS+=(--noise-gate "$INPUT_NOISE_GATE")
        fi
        guardmarly "${ARGS[@]}"

        # Derive findings count from the already-generated output rather than re-scanning.
        # Fall back to a fresh JSON scan only when the primary format is not json/sarif.
        if [ "$INPUT_FORMAT" = "json" ] && [ -n "$INPUT_OUTPUT" ]; then
          COUNT_FILE="$INPUT_OUTPUT"
          REMOVE_COUNT_FILE=false
        elif [ "$INPUT_FORMAT" = "sarif" ] && [ -n "$INPUT_OUTPUT" ]; then
          # Extract count from SARIF results array length
          COUNT_FILE=""
        else
          COUNT_FILE="$(mktemp)"
          COUNT_ARGS=("$INPUT_PATH" --format json --fail-on never "${EXCLUDE_FLAGS[@]}")
          if [ -n "$INPUT_OUTPUT_DIR" ]; then
            COUNT_ARGS+=(--output-dir "$INPUT_OUTPUT_DIR")
          fi
          if [ -n "$INPUT_NOISE_GATE" ]; then
            COUNT_ARGS+=(--noise-gate "$INPUT_NOISE_GATE")
          fi
          guardmarly "${COUNT_ARGS[@]}" > "$COUNT_FILE" 2>/dev/null || true
          REMOVE_COUNT_FILE=true
        fi

        FINDINGS_COUNT="$(python3 - "$INPUT_FORMAT" "${INPUT_OUTPUT:-}" "${COUNT_FILE:-}" <<'PY'
        import json, sys

        fmt, out_file, count_file = sys.argv[1], sys.argv[2], sys.argv[3]

        def count_from_json(path):
          with open(path, encoding="utf-8") as fh:
            data = json.load(fh)
          if isinstance(data, dict):
            s = data.get("summary")
            if isinstance(s, dict) and isinstance(s.get("total_findings"), int):
              return s["total_findings"]
            return sum(len(e.get("findings", [])) for e in data.get("results", []) if isinstance(e, dict))
          if isinstance(data, list):
            return sum(len(e.get("findings", [])) for e in data if isinstance(e, dict))
          return 0

        def count_from_sarif(path):
          with open(path, encoding="utf-8") as fh:
            data = json.load(fh)
          total = 0
          for run in data.get("runs", []):
            total += len(run.get("results", []))
          return total

        try:
          if fmt == "sarif" and out_file:
            print(count_from_sarif(out_file))
          elif count_file:
            print(count_from_json(count_file))
          else:
            print(0)
        except Exception:
          print(0)
        PY
        )"

        [ "${REMOVE_COUNT_FILE:-false}" = "true" ] && rm -f "$COUNT_FILE"
        echo "findings_count=$FINDINGS_COUNT" >> "$GITHUB_OUTPUT"

        # Enforce fail-on threshold using exit code — no third scan needed
        if [ "$INPUT_FAIL_ON" != "never" ]; then
          FAIL_ARGS=("$INPUT_PATH" --format text --no-colour --fail-on "$INPUT_FAIL_ON" "${EXCLUDE_FLAGS[@]}")
          if [ -n "$INPUT_OUTPUT_DIR" ]; then
            FAIL_ARGS+=(--output-dir "$INPUT_OUTPUT_DIR")
          fi
          if [ -n "$INPUT_NOISE_GATE" ]; then
            FAIL_ARGS+=(--noise-gate "$INPUT_NOISE_GATE")
          fi
          guardmarly "${FAIL_ARGS[@]}" 2>&1 || exit 1
        fi

    - name: Upload SARIF to Code Scanning
      if: ${{ inputs.upload-sarif == 'true' && inputs.format == 'sarif' && inputs.output != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.output }}
        category: guardmarly

    - name: Post PR inline comments
      if: ${{ inputs.post-pr-comments == 'true' && github.event_name == 'pull_request' && inputs.format == 'sarif' && inputs.output != '' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SARIF_FILE: ${{ inputs.output }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        python3 - <<'PY'
        import json, os, urllib.request, urllib.error

        sarif_file = os.environ["SARIF_FILE"]
        token = os.environ["GITHUB_TOKEN"]
        repo = os.environ["REPO"]
        pr_number = os.environ["PR_NUMBER"]

        try:
            with open(sarif_file, encoding="utf-8") as fh:
                data = json.load(fh)
        except Exception as exc:
            print(f"[guardmarly] Cannot read SARIF: {exc}")
            raise SystemExit(0)

        comments = []
        for run in data.get("runs", []):
            for result in run.get("results", []):
                msg = result.get("message", {}).get("text", "Security finding")
                for loc in result.get("locations", []):
                    phys = loc.get("physicalLocation", {})
                    path = phys.get("artifactLocation", {}).get("uri", "")
                    line = phys.get("region", {}).get("startLine", 1)
                    rule_id = result.get("ruleId", "")
                    body = f"**[guardmarly]** `{rule_id}` — {msg}"
                    comments.append({"path": path, "line": line, "side": "RIGHT", "body": body})

        if not comments:
            print("[guardmarly] No findings to post as PR comments.")
            raise SystemExit(0)

        url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/reviews"
        headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "Content-Type": "application/json",
        }
        payload = json.dumps({
            "body": f"guardmarly found {len(comments)} security finding(s). See inline comments.",
            "event": "COMMENT",
            "comments": comments[:50],
        }).encode("utf-8")

        req = urllib.request.Request(url, data=payload, headers=headers, method="POST")
        try:
            with urllib.request.urlopen(req) as resp:
                print(f"[guardmarly] Posted {len(comments)} inline comment(s). HTTP {resp.status}")
        except urllib.error.HTTPError as exc:
            print(f"[guardmarly] Failed to post PR comments: HTTP {exc.code} {exc.reason}")
            raise SystemExit(1)
        PY
