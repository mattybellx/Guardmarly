site_name: Guardmarly
site_description: Static analysis for authorization-sensitive and related code-security issues
site_url: https://github.com/mattybellx/Guardmarly
repo_url: https://github.com/mattybellx/Guardmarly
repo_name: mattybellx/Guardmarly

# Built-in search via MkDocs Material
docs_dir: docs

plugins:
  - search

theme:
  name: material
  features:
    - search.highlight
    - search.share
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - CI Integration: ci-integration.md
  - IDE Setup: ide-setup.md
  - Rule Database: rule-database.md
  - FAQ / Troubleshooting: faq.md
  - Architecture:
      - Interprocedural Taint Analysis: interprocedural-taint-analysis.md
      - IDE Plugin Architecture: ide-plugin-architecture.md
  - Benchmarks: BENCHMARKS.md
  - Writing Rules: writing-rules.md
  - Roadmap: ROADMAP.md
