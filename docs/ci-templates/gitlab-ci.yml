# Ansede Static — GitLab CI Security Scanning Template
#
# USAGE — add to your .gitlab-ci.yml:
#   include:
#     - remote: 'https://raw.githubusercontent.com/mattybellx/Ansede/master/docs/ci-templates/gitlab-ci.yml'
#
# Or copy this file directly into your project.

stages:
  - security

ansede-sast:
  stage: security
  image: python:3.11-slim
  script:
    - pip install ansede-static --quiet
    - |
      ansede-static "${ANSEDE_PATH:-.}" \
        --format sarif \
        --output ansede.sarif \
        --fail-on "${ANSEDE_FAIL_ON:-high}" \
        --min-confidence "${ANSEDE_MIN_CONFIDENCE:-0.65}" \
        ${ANSEDE_EXCLUDE:+--exclude "$ANSEDE_EXCLUDE"}
  artifacts:
    when: always
    reports:
      sast: ansede.sarif
    paths:
      - ansede.sarif
    expire_in: 30 days
  variables:
    ANSEDE_PATH: "."
    ANSEDE_FAIL_ON: "high"
    ANSEDE_MIN_CONFIDENCE: "0.65"
    ANSEDE_EXCLUDE: ""
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: false
  interruptible: true
