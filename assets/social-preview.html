<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200,height=630">
<title>Ansede Social Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    text-align: center;
    padding: 60px;
  }
  .logo {
    font-size: 72px;
    font-weight: 800;
    color: #6366f1;
    margin-bottom: 16px;
    letter-spacing: -2px;
  }
  .tagline {
    font-size: 36px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .sub {
    font-size: 22px;
    color: #94a3b8;
    margin-bottom: 32px;
    line-height: 1.4;
  }
  .stats {
    display: flex;
    gap: 40px;
    justify-content: center;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 42px;
    font-weight: 800;
    color: #6366f1;
  }
  .stat-label {
    font-size: 16px;
    color: #94a3b8;
    margin-top: 4px;
  }
  .url {
    font-size: 18px;
    color: #475569;
    margin-top: 40px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔍 Ansede</div>
  <div class="tagline">Find authorization bugs before attackers do.</div>
  <div class="sub">The only free SAST with built-in IDOR detection. Zero noise. 100% offline.</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-value">100%</div>
      <div class="stat-label">CVE Recall (164/164)</div>
    </div>
    <div class="stat">
      <div class="stat-value">0%</div>
      <div class="stat-label">False Positives</div>
    </div>
    <div class="stat">
      <div class="stat-value">5</div>
      <div class="stat-label">Languages</div>
    </div>
  </div>
  <div class="url">github.com/mattybellx/Ansede</div>
</div>
</body>
</html>
